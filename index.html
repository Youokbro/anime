<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="description" content="AnimeStream - Watch anime with multiple source options">
<meta name="theme-color" content="#000">
<title>AnimeStream</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;width:100%}
body{background:#000;color:#fff;font-family:-apple-system,Helvetica,Arial,sans-serif;font-size:14px;overflow-x:hidden;touch-action:manipulation;-webkit-user-select:none;user-select:none;-webkit-touch-callout:none}
input,button{font-size:16px;-webkit-user-select:text;user-select:text}
.page{display:none}
.page.active{display:block}
img{max-width:100%}

.nav{background:#000;padding:10px 14px;display:table;width:100%;border-bottom:1px solid #222}
.nav-cell{display:table-cell;vertical-align:middle}
.nav-title{font-size:20px;font-weight:bold;color:#fff}
.nav-back{padding:5px 10px;background:none;color:#fff;border:1px solid #fff;border-radius:4px;cursor:pointer;font-size:14px;-webkit-touch-callout:default;-webkit-user-select:none;user-select:none}
@media (max-width:1024px){
  .nav-title{font-size:18px}
  .nav-back{font-size:12px;padding:4px 8px}
}

.search-wrap{padding:12px 14px;background:#000}
.search-row{display:table;width:100%}
.search-row .c{display:table-cell;vertical-align:middle}
.search-row input{width:100%;padding:10px 12px;border:1px solid #222;border-radius:4px;background:#000;color:#fff;outline:none;font-size:16px}
.search-row input:focus{border-color:#fff}
.search-row button{padding:10px 16px;margin-left:6px;border:none;border-radius:4px;background:#fff;color:#000;font-weight:bold;cursor:pointer;min-height:44px}
@media (max-width:600px){
  .search-row button{padding:8px 12px;margin-left:4px;font-size:13px}
}

.section-title{padding:14px 12px 8px;font-size:16px;font-weight:bold;color:#fff;content-visibility:auto}
.card-table{margin:0 6px 14px;content-visibility:auto}
.card-table table{width:100%;border-collapse:collapse}
.card-table td{width:25%!important;padding:4px;text-align:center;vertical-align:top}
@media (max-width:600px){.card-table td{width:50%!important}}
.poster-card{display:block;background:#000;border-radius:4px;overflow:hidden;cursor:pointer;border:1px solid #111;transition:transform .15s;contain:layout style}
.poster-card:active{transform:scale(.97)}
.poster-card img{width:100%;display:block;min-height:140px;background:#000;object-fit:cover;content-visibility:auto}
.poster-card .label{padding:6px 4px;font-size:11px;color:#fff;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;line-height:1.2}

.detail-title{font-size:18px;color:#fff;padding:12px 12px 0;margin:0}
.detail-gap{height:12px}
.detail-desc{color:#ccc;font-size:13px;line-height:1.5;margin-bottom:12px}
.detail-cover{width:100%;display:block;border-radius:4px;margin-bottom:10px}

.detail-top{display:table;width:100%}
.detail-left{display:table-cell;width:35%;vertical-align:top;padding:12px}
.detail-right{display:table-cell;width:65%;vertical-align:top;padding:12px 12px 12px 0}

@media (max-width:767px){
.detail-top,.detail-left,.detail-right{display:block;width:auto}
.detail-left{padding:12px 12px 0}
.detail-right{padding:0 12px 12px}
}

@media (min-width:768px) and (max-width:1024px){
.detail-left{width:40%}
.detail-right{width:60%}
#player-page video{max-width:100%;height:auto}
.episode-table{font-size:12px}
.episode-table td{padding:6px 8px}
}

@media (min-width:1025px){
.detail-cover{max-width:300px}
.detail-left{width:30%}
.detail-right{width:70%}
}

.episode-table{width:100%;border-collapse:collapse}
.episode-table th{background:#000;padding:8px 10px;text-align:left;font-size:12px;color:#999;border-bottom:1px solid #222}
.episode-table td{padding:8px 10px;font-size:13px;border-bottom:1px solid #111;cursor:pointer}
.episode-table tr:nth-child(odd) td{background:#000}
.episode-table tr:nth-child(even) td{background:#000}
.episode-table tr td:first-child{width:40px;color:#fff;text-align:center}

.season-row{text-align:center;padding:8px 4px}
.season-btn{display:inline-block;padding:5px 12px;margin:3px;border:1px solid #333;border-radius:4px;background:#000;color:#ccc;cursor:pointer;font-size:11px}
.season-btn.active{background:#fff;color:#000;border-color:#fff;font-weight:bold}

#player-page{position:fixed;top:0;left:0;right:0;bottom:0;z-index:100;background:#000}
#player-page video{width:100%;max-width:960px;display:block;margin:0 auto;background:#000}
video::-webkit-media-controls-toggle-closed-captions-button{display:none!important}
video::-webkit-media-controls-closed-captions-button{display:none!important}
.player-top{background:#000;padding:8px 12px;display:table;width:100%}
.player-top .c{display:table-cell;vertical-align:middle}
.player-info{font-size:13px;color:#fff;padding-left:10px}
.player-controls{text-align:center;padding:6px 8px;display:table;width:100%;background:#000;flex-wrap:wrap}
.player-controls .c{display:table-cell;vertical-align:middle;padding:0 4px;white-space:nowrap}
.player-controls select{padding:4px 8px;background:#000;color:#fff;border:1px solid #222;border-radius:4px;font-size:13px;-webkit-appearance:none;-moz-appearance:none;appearance:none}
.player-controls label{color:#ccc;font-size:12px}
.player-controls button{padding:4px 8px;background:#000;color:#fff;border:1px solid #222;border-radius:4px;cursor:pointer;font-size:12px;min-height:32px}
@media (max-width:1024px){
  .player-controls .c{display:inline-block;padding:4px 3px}
  .player-controls select{font-size:12px;padding:3px 6px}
  .player-controls label{font-size:11px}
}
.player-sub{text-align:center;padding:6px}
.player-sub select{padding:4px 8px;background:#000;color:#fff;border:1px solid #222;border-radius:4px;font-size:13px}
.ext-link{display:inline-block;padding:10px 20px;background:#fff;color:#000;border-radius:4px;font-weight:bold;text-decoration:none;margin-top:10px}

@keyframes pulse{0%,100%{opacity:.4}50%{opacity:1}}
.loading{text-align:center;padding:30px;color:#888;animation:pulse 1.5s ease-in-out infinite}
.torrent-panel{background:#000;padding:10px;max-height:300px;overflow-y:auto;text-align:left}
.torrent-item{padding:8px 10px;margin:4px 0;border:1px solid #222;border-radius:4px;cursor:pointer;font-size:12px;color:#fff}
.torrent-item:hover{border-color:#555;background:#111}
.torrent-item .ttl{color:#fff;font-size:13px}
.torrent-item .meta{color:#ccc;font-size:11px;margin-top:3px}
.torrent-item .seed{color:#4caf50;font-weight:bold}
.torrent-item .sz{color:#ff9800;font-weight:bold;margin-right:4px}
.torrent-panel .torrent-status{padding:15px;text-align:center;color:#ccc;font-size:13px}
.torrent-panel .wt-hash{color:#999;font-size:10px;word-break:break-all;margin:6px 0}
.torrent-panel .wt-bar-wrap{background:#111;border-radius:4px;height:8px;margin:8px 0;overflow:hidden}
.torrent-panel .wt-bar-fill{height:100%;width:0%;background:#fff;border-radius:4px;transition:width .3s}
.torrent-panel .wt-info{color:#ccc;font-size:11px;margin:3px 0}
.torrent-panel .wt-info span{margin:0 8px}
.error{text-align:center;padding:30px;color:#f44;font-size:13px}

.btn-status{display:inline-block;padding:4px 10px;margin:2px;border:1px solid #222;border-radius:4px;background:#000;color:#fff;cursor:pointer;font-size:12px;text-decoration:none}
.btn-status.active{background:#fff;color:#000;border-color:#fff;font-weight:bold}
.login-btn{display:inline-block;padding:4px 12px;background:#fff;color:#000;border:none;border-radius:4px;cursor:pointer;font-weight:bold;font-size:12px;text-decoration:none}
.avatar-img{width:30px;height:30px;border-radius:50%;vertical-align:middle;border:2px solid #fff}
.nav-right{text-align:right}
.logout-link{color:#999;font-size:11px;margin-left:6px;cursor:pointer;text-decoration:underline}
</style>
<script>
// Load HLS.js
var hlsScript = document.createElement('script');
hlsScript.src = 'https://cdn.jsdelivr.net/npm/hls.js@latest/dist/hls.min.js';
hlsScript.async = false;
document.head.appendChild(hlsScript);
</script>
</head>
<body>

<div id="home-page" class="page active">
  <div class="nav" style="display:table;width:100%;background:#111"><div class="nav-cell nav-title">AnimeStream</div><div class="nav-cell nav-right" id="anilist-nav"></div></div>
  <div class="search-wrap">
    <div class="search-row">
      <div class="c" style="width:100%"><input id="home-search-input" type="text" placeholder="Search..." onkeydown="if(event.keyCode===13)doHomeSearch()"></div>
      <div class="c" style="width:auto"><button onclick="doHomeSearch()">Go</button></div>
    </div>
  </div>
  <div id="home-sections"><div id="anilist-sections"></div><div id="catalog-sections"></div></div>
</div>

<div id="search-page" class="page">
  <div class="nav">
    <div class="nav-cell" style="width:auto"><button class="nav-back" onclick="showPage('home')">Back</button></div>
    <div class="nav-cell nav-title" style="padding-left:10px">Search</div>
  </div>
  <div class="search-wrap">
    <div class="search-row">
      <div class="c" style="width:100%"><input id="search-input" type="text" placeholder="Search..." onkeydown="if(event.keyCode===13)doSearch()"></div>
      <div class="c" style="width:auto"><button onclick="doSearch()">Go</button></div>
    </div>
  </div>
  <div id="search-results"></div>
</div>

<div id="detail-page" class="page">
  <div class="nav">
    <div class="nav-cell" style="width:auto"><button class="nav-back" onclick="showPage('home')">Back</button></div>
    <div class="nav-cell nav-title" style="padding-left:10px">Details</div>
  </div>
  <div id="detail-content"></div>
</div>

<div id="player-page" class="page">
  <div class="player-top">
    <div class="c" style="width:auto"><button class="nav-back" onclick="closePlayer()">Back</button></div>
    <div class="c player-info" id="player-info">Episode</div>
  </div>
  <video id="player-video" controls autoplay playsinline></video>
  <div id="player-controls" class="player-controls"></div>
  <div id="torrent-panel" class="torrent-panel" style="display:none"></div>
  <div class="player-sub" id="player-subtitles"></div>
</div>

<script>
var CURRENT_STREAMS = [];
var CURRENT_SUBTITLES = [];
var _failTimeout = null;
var _episodeCache = {};
var _currentSubIdx = -1;
var _seedrFolderId = null;
var _apiCache = {}; // Add caching for API responses
var _pendingRequests = {}; // Track pending requests to avoid duplicates

var MIRURO_API = "https://miruro-api-navy.vercel.app";
var PROXY_BASE = "https://anim-proxy-worker.ahaantadi.workers.dev/";
var TORRENT_API = "https://anime-api-nu-eight.vercel.app";
var RELAY_API = "";
var SEEDR_API = TORRENT_API + "/seedr";
var USE_PROXY = !document.createElement("video").canPlayType("application/vnd.apple.mpegurl");
var CURRENT_ANIME_ID = 0;
var CURRENT_ANIME_ANILIST_ID = 0;
var CURRENT_ANIME_TITLE = "";
var CURRENT_ANIME_ROMAJI = "";
var CURRENT_TMDB_ID = "";
var CURRENT_IMDB_ID = "";
var CURRENT_SEASON = 1;
var CURRENT_EP_NUM = 0;
var SUB_ONLY = localStorage.getItem("sub_only") === "true";
var _lastPage = "home";
var _homeCardData = [];
var _homeResults = [];
var _lastAnilistSearch = [];
var _episodeList = [];
var _catalogLoaded = false;

var ANILIST_CLIENT_ID = "43388";
var ANILIST_TOKEN = localStorage.getItem("anilist_token") || "";
var ANILIST_USER = null;

// API Cache helper
function getCached(key) {
  var cached = _apiCache[key];
  if (cached && Date.now() - cached.time < 3600000) return cached.data; // 1 hour
  return null;
}
function setCached(key, data) {
  _apiCache[key] = { data: data, time: Date.now() };
}

function checkAnilistToken() {
  var h = window.location.hash;
  if (h.indexOf("access_token=") > -1) {
    var m = h.match(/access_token=([^&]+)/);
    if (m) {
      ANILIST_TOKEN = m[1];
      localStorage.setItem("anilist_token", ANILIST_TOKEN);
      history.replaceState(null, "", window.location.pathname + window.location.search);
    }
  }
  anilistRefresh();
}

function anilistPasteToken() {
  var inp = document.getElementById("token-input");
  if (!inp || !inp.value.trim()) return;
  ANILIST_TOKEN = inp.value.trim();
  localStorage.setItem("anilist_token", ANILIST_TOKEN);
  anilistRefresh();
}

function anilistLogin() {
  var redirect = encodeURIComponent(window.location.origin + window.location.pathname.replace(/\/$/, ""));
  window.location.href = "https://anilist.co/api/v2/oauth/authorize?client_id=" + ANILIST_CLIENT_ID + "&redirect_uri=" + redirect + "&response_type=token";
}

function anilistLogout() {
  ANILIST_TOKEN = ""; ANILIST_USER = null;
  localStorage.removeItem("anilist_token");
  location.reload();
}

function anilistGraphQL(query, vars, cb) {
  var x = new XMLHttpRequest();
  x.open("POST", "https://graphql.anilist.co", true);
  x.setRequestHeader("Content-Type", "application/json");
  x.setRequestHeader("Accept", "application/json");
  if (ANILIST_TOKEN) x.setRequestHeader("Authorization", "Bearer " + ANILIST_TOKEN);
  x.onreadystatechange = function() {
    if (x.readyState === 4) {
      if (x.status === 200) { try { cb(null, JSON.parse(x.responseText).data); } catch(e) { cb("Parse error"); } }
      else { cb(x.status); }
    }
  };
  x.send(JSON.stringify({ query: query, variables: vars || {} }));
}

function anilistRefresh() {
  var nav = document.getElementById("anilist-nav");
  if (!nav) return;
  if (!ANILIST_TOKEN) {
    nav.innerHTML = '<a class="login-btn" href="https://anilist.co/api/v2/oauth/authorize?client_id=43388&redirect_uri=https%3A%2F%2Fyouokbro.github.io%2Fanime&response_type=token">Login</a> <input id="token-input" type="text" placeholder="Paste token" style="width:70px;padding:3px 5px;background:#111;border:1px solid #333;border-radius:3px;color:#eee;font-size:10px;vertical-align:middle"> <button onclick="anilistPasteToken()" style="padding:3px 6px;background:#fff;color:#000;border:none;border-radius:3px;cursor:pointer;font-size:10px">Set</button>';
    return;
  }
  nav.innerHTML = '<span class="loading" style="font-size:11px;color:#888">Loading...</span>';
  anilistGraphQL("query { Viewer { id name avatar { large } } }", {}, function(err, data) {
    if (err || !data || !data.Viewer) {
      if (err === 401) {
        ANILIST_TOKEN = ""; localStorage.removeItem("anilist_token");
        nav.innerHTML = '<a class="login-btn" href="https://anilist.co/api/v2/oauth/authorize?client_id=43388&redirect_uri=https%3A%2F%2Fyouokbro.github.io%2Fanime&response_type=token">Login</a> <input id="token-input" type="text" placeholder="Paste token" style="width:70px;padding:3px 5px;background:#111;border:1px solid #333;border-radius:3px;color:#eee;font-size:10px;vertical-align:middle"> <button onclick="anilistPasteToken()" style="padding:3px 6px;background:#fff;color:#000;border:none;border-radius:3px;cursor:pointer;font-size:10px">Set</button>';
      } else {
        nav.innerHTML = '<span style="font-size:11px;color:#888">Retry...</span>';
        setTimeout(function() { anilistRefresh(); }, 3000);
      }
      return;
    }
    ANILIST_USER = data.Viewer;
    var a = data.Viewer.avatar;
    var img = (a && a.large) ? '<img class="avatar-img" src="' + a.large + '" alt=""> ' : "";
    nav.innerHTML = img + '<span style="font-size:12px;color:#eee">' + data.Viewer.name + '</span> <span class="logout-link" onclick="anilistLogout()">(logout)</span>';
    loadAnilistSections();
  });
}

function loadAnilistSections() {
  var sec = document.getElementById("anilist-sections");
  if (!sec) return;
  anilistGraphQL("query ($u: Int) { MediaListCollection(userId: $u, type: ANIME) { lists { name entries { id progress media { id title { romaji english } coverImage { extraLarge } episodes } } } } }", { u: ANILIST_USER.id }, function(err, data) {
    if (err || !data || !data.MediaListCollection) return;
    var lists = data.MediaListCollection.lists || [];
    var html = "";
    for (var i = 0; i < lists.length; i++) {
      var list = lists[i];
      var name = list.name || "";
      var entries = list.entries || [];
      if (!entries.length) continue;
      var label = "";
      if (name === "CURRENT") label = "Continue Watching";
      else if (name === "PLANNING") label = "My List";
      else continue;
      html += '<div class="section-title">' + label + '</div><div class="card-table"><table><tr>';
      for (var j = 0; j < entries.length && j < 20; j++) {
        var e = entries[j];
        var m = e.media || {};
        var img = (m.coverImage && (m.coverImage.extraLarge || m.coverImage.large)) || "";
        var t = m.title ? (m.title.english || m.title.romaji || "") : "";
        var ep = m.episodes || "?";
        var prog = e.progress || 0;
        var cardIdx = _homeCardData.length;
        _homeCardData.push({ id: m.id, title: t, anilistId: m.id });
        html += '<td><div class="poster-card" onclick="openHomeCard(' + cardIdx + ')">';
        if (img) html += '<img src="' + img + '" alt="" onerror="this.style.display=\"none\"">';
        else html += '<div style="height:140px;background:#111"></div>';
        html += '<div class="label">' + t + '</div>';
        if (name === "CURRENT") html += '<div style="font-size:10px;color:#fff">Ep ' + prog + '/' + ep + '</div>';
        html += '</div></td>';
        if ((j + 1) % 3 === 0 && j < entries.length - 1) html += '</tr><tr>';
      }
      html += '</tr></table></div>';
    }
    if (html) sec.innerHTML = html;
  });
}

function loadAnilistStatus(mediaId) {
  var el = document.getElementById("anilist-status");
  if (!el || !ANILIST_TOKEN) return;
  anilistGraphQL("query ($id: Int, $u: Int) { Media(id: $id) { mediaListEntry { id status progress } } }", { id: parseInt(mediaId, 10), u: ANILIST_USER ? ANILIST_USER.id : 0 }, function(err, data) {
    if (err || !data || !data.Media) return;
    var entry = data.Media.mediaListEntry;
    var cur = entry ? entry.status : "";
    var prog = entry ? (entry.progress || 0) : 0;
    var statuses = ["CURRENT", "PLANNING", "COMPLETED", "DROPPED", "PAUSED"];
    var labels = ["Watching", "Planning", "Completed", "Dropped", "Paused"];
    var html = '<div class="section-title" style="margin-top:8px">AniList Status</div><div class="status-row">';
    for (var i = 0; i < statuses.length; i++) {
      var active = statuses[i] === cur ? ' active' : '';
      html += '<a class="btn-status' + active + '" href="#" onclick="saveAnilistStatus(' + mediaId + ',\'' + statuses[i] + '\');return false;">' + labels[i] + '</a> ';
    }
    if (entry) html += '<span style="font-size:11px;color:#888;margin-left:8px">Progress: ' + prog + '</span>';
    html += '</div>';
    el.innerHTML = html;
  });
}

function saveAnilistStatus(mediaId, status) {
  anilistGraphQL("mutation ($m: Int, $s: MediaListStatus) { SaveMediaListEntry(mediaId: $m, status: $s) { id status progress } }", { m: parseInt(mediaId, 10), s: status }, function(err, data) {
    if (err) { alert("Failed to update AniList"); return; }
    loadAnilistStatus(mediaId);
    loadAnilistSections();
  });
}

function saveAnilistProgress(mediaId, episode) {
  if (!ANILIST_TOKEN || !ANILIST_USER) return;
  anilistGraphQL("query ($id: Int, $u: Int) { Media(id: $id) { mediaListEntry { id status progress } } }", { id: parseInt(mediaId, 10), u: ANILIST_USER.id }, function(err, data) {
    if (err || !data || !data.Media) return;
    var entry = data.Media.mediaListEntry;
    var curProg = entry ? (entry.progress || 0) : 0;
    var curStatus = entry ? entry.status : null;
    var newProg = episode > curProg ? episode : curProg;
    var newStatus = curStatus === "COMPLETED" ? "COMPLETED" : "CURRENT";
    anilistGraphQL("mutation ($m: Int, $s: MediaListStatus, $p: Int) { SaveMediaListEntry(mediaId: $m, status: $s, progress: $p) { id status progress } }", { m: parseInt(mediaId, 10), s: newStatus, p: newProg }, function(err2, data2) {
      if (!err2) { loadAnilistSections(); loadAnilistStatus(mediaId); }
    });
  });
}


function showPage(name) {
  var pages = ["home","search","detail","player"];
  for (var i = 0; i < pages.length; i++) document.getElementById(pages[i] + "-page").className = "page";
  document.getElementById(name + "-page").className = "page active";
  document.body.style.overflow = (name === "player") ? "hidden" : "";
  if (name !== "player") {
    var v = document.getElementById("player-video");
    if (v) { v.pause(); v.src = ""; v.innerHTML = ""; }
    if (window._hls) { window._hls.destroy(); window._hls = null; }
  }
}

function doHomeSearch() {
  var q = document.getElementById("home-search-input").value.trim();
  if (q.length > 0) { document.getElementById("search-input").value = q; doSearch(); }
}

function getTitle(i) {
  var t = i.title;
  if (typeof t === "string") return t;
  if (t && typeof t === "object") return t.english || t.romaji || t.userPreferred || t.native || "";
  return i.name || "";
}

function getImg(i) {
  var c = i.coverImage;
  if (c && typeof c === "object") return c.extraLarge || c.large || c.medium || "";
  return i.image || i.cover || i.poster || "";
}

var _homeCardData = [];

function buildSection(title, data) {
  var r = data.results || [];
  if (!r.length) return "";
  var h = '<div class="section-title">' + title + '</div><div class="card-table"><table><tr>';
  for (var i = 0; i < r.length; i++) {
    var idx = _homeCardData.length;
    _homeCardData.push({ id: r[i].id, title: getTitle(r[i]) });
    h += '<td><div class="poster-card" onclick="openHomeCard(' + idx + ')">';
    h += '<img src="' + getImg(r[i]) + '" alt="" onerror="this.style.display=\'none\'">';
    h += '<div class="label">' + getTitle(r[i]) + '</div></div></td>';
    if ((i + 1) % 3 === 0 && i < r.length - 1) h += '</tr><tr>';
  }
  return h + '</tr></table></div>';
}

function loadHome() {
  var c = document.getElementById("catalog-sections");
  c.innerHTML = '<div class="loading">Loading...</div>';
  _homeResults = [];
  var queries = [

function showAnilistDetail(media) {
  CURRENT_ANIME_ID = media.id;
  CURRENT_ANIME_ANILIST_ID = media.id;
  _originalAniListId = media.id;
  loadSeasonRelations(media.id);
  CURRENT_ANIME_TITLE = getTitle(media);
  CURRENT_ANIME_ROMAJI = (media.title && media.title.romaji) || CURRENT_ANIME_TITLE;
  _lastPage = "detail";
  showPage("detail");
  var c = document.getElementById("detail-content");
  var img = getImg(media);
  var title = getTitle(media);
  var desc = (media.description || "").replace(/<[^>]*>/g, "");
  var html = '<h1 class="detail-title">' + title + '</h1>';
  html += '<div class="detail-gap"></div>';
  html += '<div class="detail-top">';
  html += '<div class="detail-left">';
  if (img) html += '<img class="detail-cover" src="' + img + '" alt="">';
  html += '</div>';
  html += '<div class="detail-right">';
  if (desc) html += '<div class="detail-desc">' + desc + '</div>';
  html += '<div id="detail-ids" style="font-size:11px;color:#555;margin-top:4px"></div>';
  html += '<div id="detail-ratings" style="padding:8px 12px;font-size:15px;font-weight:bold"></div>';
  html += '</div></div>';
  html += '<div class="section-title" style="padding-left:12px">Episodes</div><div id="season-tabs"></div><div id="ep-list"><div class="loading">Loading episodes...</div></div><div id="anilist-status"></div>';
  html += '</div></div>';
  c.innerHTML = html;

  // Show rating from cached data immediately
  var ratEl = document.getElementById("detail-ratings");
  var parts = [];
  if (media.averageScore) parts.push("AniList: " + (media.averageScore / 10).toFixed(1));
  ratEl.innerHTML = parts.join("  |  ");
  if (media.idMal) fetchMalScore(media.idMal);

  // Fire episode loading IMMEDIATELY — search TMDB by title, don't wait for AniList
  searchTMDB(CURRENT_ANIME_TITLE, function(tmdbId) {
    if (tmdbId) {
      CURRENT_TMDB_ID = tmdbId;
      loadTmdbSeasons(tmdbId);
      fetchTmdbRating(tmdbId);
    }
  });

  // Background: ratings + AniList status + relations + MAL score + IDs
  anilistGraphQL("query ($id: Int, $u: Int) { Media(id: $id) { id averageScore idMal externalLinks { site url id } relations { edges { relationType node { id title { romaji english } } } } mediaListEntry { id status progress } } }",
    { id: media.id, u: ANILIST_USER ? ANILIST_USER.id : 0 },
    function(err, data) {
      if (err || !data || !data.Media) return;
      var m = data.Media;

      // Ratings — update AniList without clearing MAL/TMDB
      var ratEl = document.getElementById("detail-ratings");
      if (ratEl && m.averageScore) {
        var txt = ratEl.textContent || ratEl.innerText || "";
        txt = txt.replace(/AniList: [\d.]+/g, "").replace(/  \|  $/, "").replace(/\s*\|\s*/g, " | ").trim();
        var anis = "AniList: " + (m.averageScore / 10).toFixed(1);
        ratEl.innerHTML = anis + (txt ? "  |  " + txt : "");
      }

      // AniList status
      var entry = m.mediaListEntry;
      var cur = entry ? entry.status : "";
      var prog = entry ? (entry.progress || 0) : 0;
      var statusEl = document.getElementById("anilist-status");
      if (statusEl && ANILIST_TOKEN) {
        var statuses = ["CURRENT", "PLANNING", "COMPLETED", "DROPPED", "PAUSED"];
        var labels = ["Watching", "Planning", "Completed", "Dropped", "Paused"];
        var sh = '<div class="section-title" style="margin-top:8px">AniList Status</div><div class="status-row">';
        for (var si = 0; si < statuses.length; si++) {
          var active = statuses[si] === cur ? ' active' : '';
          sh += '<a class="btn-status' + active + '" href="#" onclick="saveAnilistStatus(' + media.id + ',\'' + statuses[si] + '\');return false;">' + labels[si] + '</a> ';
        }
        if (entry) sh += '<span style="font-size:11px;color:#999;margin-left:8px">Progress: ' + prog + '</span>';
        statusEl.innerHTML = sh + '</div>';
      }

      // Season relations — map SEQUELs with "Season X" in title to their season number
      _seasonAniMap = {};
      if (m.relations) {
        for (var ei = 0; ei < m.relations.edges.length; ei++) {
          var e = m.relations.edges[ei];
          if (e.relationType === "SEQUEL") {
            var t = (e.node.title && e.node.title.romaji) || (e.node.title && e.node.title.english) || "";
            var sm = t.match(/Season\s+(\d+)/i);
            if (sm) _seasonAniMap[parseInt(sm[1], 10)] = e.node.id;
          }
        }
      }
      // Also check SEQUELs' SEQUELs for "Season X" entries deeper in the chain
      if (m.relations) {
        var _directIds = [];
        for (var ei = 0; ei < m.relations.edges.length; ei++) {
          if (m.relations.edges[ei].relationType === "SEQUEL") _directIds.push(m.relations.edges[ei].node.id);
        }
        if (_directIds.length) {
          (function(ids) {
            var sxhr = new XMLHttpRequest();
            sxhr.open("POST", "https://graphql.anilist.co", true);
            sxhr.setRequestHeader("Content-Type", "application/json");
            sxhr.onload = function() {
              if (sxhr.status !== 200) return;
              try {
                var sdata = JSON.parse(sxhr.responseText);
                var pages = sdata && sdata.data && sdata.data.Page;
                if (!pages || !pages.media) return;
                for (var mi = 0; mi < pages.media.length; mi++) {
                  var media = pages.media[mi];
                  if (!media.relations) continue;
                  for (var ej = 0; ej < media.relations.edges.length; ej++) {
                    var e2 = media.relations.edges[ej];
                    if (e2.relationType === "SEQUEL") {
                      var t2 = (e2.node.title && e2.node.title.romaji) || (e2.node.title && e2.node.title.english) || "";
                      var sm2 = t2.match(/Season\s+(\d+)/i);
                      if (sm2 && !_seasonAniMap[parseInt(sm2[1], 10)]) _seasonAniMap[parseInt(sm2[1], 10)] = e2.node.id;
                    }
                  }
                }
              } catch (e) {}
            };
            sxhr.send(JSON.stringify({ query: "query($ids:[Int]){Page(page:1,perPage:10){media(id_in:$ids){id relations{edges{relationType node{id title{romaji}}}}}}}", variables: { ids: ids } }));
          })(_directIds);
        }
      }

      // IDs
      var tmdbId = "";
      var imdbId = "";
      var malId = m.idMal;
      if (m.externalLinks) {
        for (var li = 0; li < m.externalLinks.length; li++) {
          var site = m.externalLinks[li].site || "";
          if (site === "Crunchyroll") continue;
          var url = m.externalLinks[li].url || "";
          var mt = url.match(/themoviedb\.org\/(?:tv|movie)\/(\d+)/i);
          if (mt) tmdbId = mt[1];
          var mi = url.match(/imdb\.com\/title\/(tt\d+)/i);
          if (mi) imdbId = mi[1];
        }
      }

      // Update TMDB ID if found (episodes may already be loading from searchTMDB above)
      if (tmdbId && !CURRENT_TMDB_ID) {
        CURRENT_TMDB_ID = tmdbId;
        CURRENT_IMDB_ID = imdbId;
        loadTmdbSeasons(tmdbId);
      } else if (tmdbId) {
        CURRENT_TMDB_ID = tmdbId;
        CURRENT_IMDB_ID = imdbId;
      }

      var idEl = document.getElementById("detail-ids");
      if (idEl) {
        var parts = [];
        if (tmdbId) parts.push("TMDB: " + tmdbId);
        if (imdbId) parts.push("IMDb: " + imdbId);
        idEl.innerHTML = parts.length ? parts.join(" &bull; ") : "";
      }

      if (malId) fetchMalScore(malId);
    }
  );
}

// TMDB-based season tabs and episode listing
var _tmdbSeasons = [];
var _seasonAniMap = {};
var _originalAniListId = 0;

function loadTmdbSeasons(tmdbId) {
  _tmdbSeasons = [];
  if (!tmdbId) return;
  var xhr = new XMLHttpRequest();
  xhr.open("GET", MIRURO_API + "/tmdb/tv/" + tmdbId, true);
  xhr.onload = function() {
    if (xhr.status !== 200) return;
    try {
      var d = JSON.parse(xhr.responseText);
      var seasons = d.seasons || [];
      var valid = [];
      for (var i = 0; i < seasons.length; i++) {
        if (seasons[i].season_number > 0 && seasons[i].episode_count > 0) valid.push(seasons[i]);
      }
      if (!valid.length) return;
      _tmdbSeasons = valid;
      var html = '<div class="season-row">';
      for (var s = 0; s < valid.length; s++) {
        var label = valid[s].name || "Season " + valid[s].season_number;
        html += '<span class="season-btn' + (s === 0 ? " active" : "") + '" onclick="switchTmdbSeason(' + s + ')">' + label + '</span>';
      }
      html += '</div>';
      document.getElementById("season-tabs").innerHTML = html;
      loadTmdbEpisodes(tmdbId, valid[0].season_number);
    } catch (e) {}
  };
  xhr.send();
}

function loadSeasonRelations(aniListId) {
  if (!aniListId) return;
  _seasonAniMap = {};
  anilistGraphQL("query ($id: Int) { Media(id: $id) { relations { edges { relationType node { id title { romaji english } } } } } }",
    { id: aniListId },
    function(err, data) {
      if (err || !data || !data.Media || !data.Media.relations) return;
      var edges = data.Media.relations.edges || [];
      for (var i = 0; i < edges.length; i++) {
        if (edges[i].relationType === "SEQUEL") {
          var node = edges[i].node;
          var t = (node.title && node.title.romaji) || (node.title && node.title.english) || "";
          var sm = t.match(/Season\s+(\d+)/i);
          if (sm) _seasonAniMap[parseInt(sm[1], 10)] = node.id;
        }
      }
    }
  );
}

function switchTmdbSeason(idx) {
  var s = _tmdbSeasons[idx];
  if (!s) return;
  document.getElementById("ep-list").innerHTML = '<div class="loading">Loading ' + (s.name || "Season " + s.season_number) + '...</div>';
  CURRENT_SEASON = s.season_number;
  var setAniId = function(id) {
    if (id !== CURRENT_ANIME_ANILIST_ID) CURRENT_ANIME_ANILIST_ID = id;
    loadTmdbEpisodes(CURRENT_TMDB_ID, s.season_number);
  };
  var newAniId = _seasonAniMap && _seasonAniMap[CURRENT_SEASON] ? _seasonAniMap[CURRENT_SEASON] : 0;
  if (newAniId) { setAniId(newAniId); }
  else if (CURRENT_SEASON > 1 && _originalAniListId) {
    // Follow SEQUEL chain by searching AniList for the anime + "Season N"
    var searchTerm = CURRENT_ANIME_TITLE + " Season " + CURRENT_SEASON;
    anilistGraphQL("query ($q: String) { Page(page: 1, perPage: 3) { media(search: $q, type: ANIME) { id title { romaji } } } }", { q: searchTerm }, function(err, data) {
      if (!err && data && data.Page && data.Page.media && data.Page.media.length) {
        var foundId = data.Page.media[0].id;
        _seasonAniMap[CURRENT_SEASON] = foundId;
        setAniId(foundId);
      } else {
        setAniId(_originalAniListId);
      }
    });
  } else {
    setAniId(_originalAniListId);
  }
  var btns = document.querySelectorAll(".season-btn");
  for (var b = 0; b < btns.length; b++) btns[b].className = "season-btn";
  if (btns[idx]) btns[idx].className = "season-btn active";
}

  var xhr = new XMLHttpRequest();
  xhr.open("GET", MIRURO_API + "/tmdb/tv/" + tmdbId + "/season/" + seasonNum, true);
  xhr.onload = function() {
    var el = document.getElementById("ep-list");
    if (xhr.status !== 200) { el.innerHTML = '<div class="error">Failed to load episodes</div>'; return; }

      CURRENT_EPISODE_LIST = eps;

      for (var i = 0; i < eps.length; i++) {

        tbl += '<td>' + num + '</td><td>' + ttl + '</td><td>' + aired + '</td></tr>';
      }
      el.innerHTML = tbl + '</table>';

function playFromDetail(num) {
  CURRENT_EP_NUM = num;
  saveAnilistProgress(CURRENT_ANIME_ANILIST_ID, num);
  document.getElementById("player-video").style.display = "block";
  showPage("player");
  var v = document.getElementById("player-video");
  v.pause(); v.src = ""; v.innerHTML = "";
  if (window._hls) { window._hls.destroy(); window._hls = null; }
  if (_failTimeout) { clearTimeout(_failTimeout); _failTimeout = null; }
  var seasonLabel = CURRENT_SEASON > 1 ? " S" + CURRENT_SEASON : "";
  document.getElementById("player-info").innerHTML = CURRENT_ANIME_TITLE + seasonLabel + " - Ep " + num;
  document.getElementById("player-controls").innerHTML = '<span class="loading">Checking all sources...</span>';
  document.getElementById("player-subtitles").innerHTML = "";

  var allSources = [];
  var allTracks = [];
  var _rendered = false;
  var _pending = 0;
  _triedStreams = [];
  _currentSubIdx = -1;

  function parseQuality(q) {
    if (!q) return 720;
    var m = q.match(/(\d+)/);
    if (m) return parseInt(m[1], 10);
    return 720;
  }

  function addSource(src) {
    if (parseQuality(src.quality) < 720) return;
    for (var c = 0; c < allSources.length; c++) { if (allSources[c].url === src.url) return; }
    allSources.push(src);
    allSources.sort(function(a, b) {
      var pa = PROVIDER_PRIORITY[a._provider] || 999;
      var pb = PROVIDER_PRIORITY[b._provider] || 999;
      if (pa !== pb) return pa - pb;
      return parseQuality(b.quality) - parseQuality(a.quality);
    });
    CURRENT_STREAMS = allSources;
    if (!_rendered) {
      _rendered = true;
      doRender();
    } else {
      updateServerDropdown();
    }
  }

  function addTracks(tracks) {
    if (!tracks) return;
    var added = false;
    for (var t = 0; t < tracks.length; t++) {
      var dup = false;
      for (var ct = 0; ct < allTracks.length; ct++) {
        if (allTracks[ct].file === tracks[t].file) { dup = true; break; }
      }
      if (!dup) { allTracks.push(tracks[t]); added = true; }
    }
    if (added && _rendered) updateSubsDropdown();
  }

  function updatePendingIndicator() {
    var ci = document.getElementById("checking-indicator");
    if (_pending > 0) {
      if (!ci) {
        var pc = document.getElementById("player-controls");
        if (pc) {
          var cs = pc.getElementsByTagName("div");
          var lastc = cs.length > 0 ? cs[cs.length - 1] : null;
          if (lastc) {
            var ciDiv = document.createElement("div");
            ciDiv.id = "checking-indicator";
            ciDiv.className = "c";
            ciDiv.style.cssText = "width:auto";
            ciDiv.innerHTML = '<span style="color:#888;font-size:11px">+' + _pending + '...</span>';
            lastc.parentNode.insertBefore(ciDiv, lastc.nextSibling);
          }
        }
      } else {
        ci.innerHTML = '<span style="color:#888;font-size:11px">+' + _pending + '...</span>';
      }
    } else if (ci) {
      ci.parentNode.removeChild(ci);
    }
  }

  function oneDone() {
    _pending--;
    updatePendingIndicator();
    if (!_rendered && _pending <= 0) {
      if (allSources.length) {

function formatSize(str) {
  if (!str) return '?';
  if (typeof str === 'number') {
    if (str >= 1024) return (str / 1024).toFixed(1) + ' GB';
    return Math.round(str) + ' MB';
  }
  if (typeof str === 'string' && !str.match(/^[\d.]+$/)) {
    var mb = parseOldSize(str);
    if (mb > 0) {
      if (mb >= 1024) return (mb / 1024).toFixed(1) + ' GB';
      return Math.round(mb) + ' MB';
    }
  }
  var n = parseFloat(str);
  if (isNaN(n) || n <= 0) return str || '?';
  if (n >= 1024) return (n / 1024).toFixed(1) + ' GB';
  return Math.round(n) + ' MB';
}

function parseOldSize(str) {
  str = str.replace(/,/g, '').trim();
  var m = str.match(/^([\d.]+)\s*(GiB|GB|MiB|MB|KiB|KB|B)?$/i);
  if (!m) return 0;
  var n = parseFloat(m[1]);
  var u = (m[2] || '').toLowerCase();
  if (u === 'gib' || u === 'gb') return n * 1024;
  if (u === 'mib' || u === 'mb') return n;
  if (u === 'kib' || u === 'kb') return n / 1024;
  if (u === 'b') return n / (1024 * 1024);
  return n;
}

function openTorrentPanel() {

  v.pause(); v.src = '';
  if (window._hls) { window._hls.destroy(); window._hls = null; }
  tp.style.display = 'block';

  tp.innerHTML = '<div class="torrent-status">Searching torrents...</div>';
  var q = CURRENT_ANIME_TITLE + ' ' + CURRENT_EP_NUM;
  var seen = {};
  var allT = [];
  var timedOut = false;

  var timeout = setTimeout(function() {
    timedOut = true;
    renderTorrents(allT, tp);
  }, 6000);

  function onResults(data) {
    if (data.torrents) {
      for (var i = 0; i < data.torrents.length; i++) {
        var t = data.torrents[i];
        if (!t.magnet) continue;
        if (!seen[t.magnet]) {
          seen[t.magnet] = true;
          allT.push(t);
        }
      }

  }

  function done() {
    clearTimeout(timeout);
    if (!timedOut) renderTorrents(allT, tp);
  }

  fetch(TORRENT_API + '/torrent/search?q=' + encodeURIComponent(q) + '&sources=nyaa,1337x')
    .then(function(r) { return r.json() }).then(onResults).catch(function() {}).then(function() {
      // Also try an alternative query if first one gave nothing
      if (allT.length < 3) {

function renderTorrents(allT, tp) {
  allT.sort(function(a, b) { return b.seeders - a.seeders });
  if (allT.length === 0) {
    tp.innerHTML = '<div class="torrent-status">No torrents found</div>';
    return;
  }
  var html = '';
  for (var i = 0; i < allT.length; i++) {
    var t = allT[i];
    var sz = formatSize(t.size);
    var seedHtml = t.seeders > 0 ? '<span class="seed">▲ ' + t.seeders + '</span> ' : '';
    html += '<div class="torrent-item" onclick="pickTorrent(' + i + ')">';
    html += '<div class="ttl">' + t.title.replace(/</g, '&lt;') + '</div>';
    html += '<div class="meta">';
    html += seedHtml;
    html += '<span class="sz">' + sz + '</span> | ' + t.quality + ' | ' + t.source;
    html += '</div></div>';
  }
  tp.innerHTML = html;
  window._torrentResults = allT;
}

function pickTorrent(idx) {
  var torrents = window._torrentResults;
  if (!torrents || idx >= torrents.length) return;
  var t = torrents[idx];
  if (!t.magnet || t.magnet === 'need_visit') {
    document.getElementById('torrent-panel').innerHTML = '<div class="torrent-status">No magnet link available for this torrent</div>';
    return;
  }
  var hash = (t.magnet.match(/btih:([a-f0-9]+)/i) || [])[1] || '';
  var tp = document.getElementById('torrent-panel');
  tp.innerHTML =
    '<div class="torrent-status">' +
    '<div style="font-size:12px;color:#eee">' + t.title.replace(/</g, '&lt;') + '</div>' +
    '<div class="wt-hash">' + hash.toUpperCase() + '</div>' +
    '<div class="wt-bar-wrap"><div id="wt-bar-fill" class="wt-bar-fill"></div></div>' +
    '<div class="wt-info"><span id="wt-pct">clearing previous downloads...</span><span id="wt-speed"></span><span id="wt-peers"></span></div>' +
    '</div>';

  // Clean up existing torrents/folders in Seedr
  fetch(SEEDR_API + '/cleanup', { method: 'POST' })
    .catch(function() {})
    .then(function() {
      // Now add the new magnet
      var pct = document.getElementById('wt-pct');
      if (pct) pct.textContent = 'sending to Seedr...';
      return fetch(SEEDR_API + '/add', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ magnet: t.magnet })
      });
    })
    .then(function(r) { return r.json() })
    .then(function(data) {
      if (data.user_torrent_id) {
        pollSeedr(data.user_torrent_id, t, hash);
        return;
      }
      if (data.wt) {
        tp.innerHTML = '<div class="torrent-status">Seedr: no free slot. <a href="https://www.seedr.cc" target="_blank" style="color:#4fc3f7">Open Seedr</a> to manage downloads.</div>';
        return;
      }
      if (data.reason_phrase) {
        if (data.reason_phrase.indexOf('_added_to_wishlist') > -1) {
          tp.innerHTML = '<div class="torrent-status">Seedr queue is full (1 slot on free). Wait or <a href="https://www.seedr.cc" target="_blank" style="color:#4fc3f7">manage on Seedr</a>.</div>';
        } else {
          throw new Error(data.reason_phrase);
        }
        return;
      }
      if (data.error) {
        throw new Error(data.error);
      }
      throw new Error('unknown response');
    })
    .catch(function(e) {
      tp.innerHTML = '<div class="torrent-status">Seedr error: ' + e.message + '</div>';
    });
}

function pollSeedr(taskId, torrent, hash) {
  var attempts = 0;
  var SEEDR_FOLDER_ID = null;
  function check() {
    fetch(SEEDR_API + '/status?task_id=' + taskId)
      .then(function(r) { return r.json() })
      .then(function(data) {
        var bar = document.getElementById('wt-bar-fill');
        var pct = document.getElementById('wt-pct');
        if (!bar || !pct) return;
        var task = data.task || (data.tasks && data.tasks[0]);
        if (task) {
          var progress = task.progress || 0;
          bar.style.width = progress + '%';
          pct.textContent = progress + '%';

          if (task.state === 'finished' || progress >= 100) {
            SEEDR_FOLDER_ID = task.folder_created_id;
            if (SEEDR_FOLDER_ID) {
              loadSeedrStream(SEEDR_FOLDER_ID, torrent);
            } else {
              pct.textContent = 'done, but no folder id';
            }
            return;
          }
        }
        attempts++;
        if (attempts > 120) {
          pct.textContent = 'timeout - check Seedr';
          return;
        }
        setTimeout(check, 3000);
      })
      .catch(function() {
        setTimeout(check, 3000);
      });
  }
  check();
}

function loadSeedrStream(folderId, torrent) {
  var tp = document.getElementById('torrent-panel');
  tp.innerHTML = '<div class="torrent-status">Loading video files from Seedr...</div>';

  fetch(SEEDR_API + '/contents?folder_id=' + folderId)
    .then(function(r) { return r.json() })
    .then(function(data) {
      var videoFile = null;
      function findVideo(items) {
        for (var i = 0; items && i < items.length; i++) {
          var f = items[i];
          if (f.is_video) videoFile = f;
          if (f.presentation_urls && f.presentation_urls.video && f.presentation_urls.video.hls) {
            videoFile = f;
          }
        }
      }
      findVideo(data.files);
      if (!videoFile && data.folders && data.folders.length > 0) {
        tp.innerHTML = '<div class="torrent-status">Video in subfolder, fetching...</div>';
        fetch(SEEDR_API + '/contents?folder_id=' + data.folders[0].id)
          .then(function(r) { return r.json() })
          .then(function(subData) { findVideo(subData.files); loadVideo(videoFile, torrent, folderId); })
          .catch(function(e) { tp.innerHTML = '<div class="torrent-status">Error: ' + e.message + '</div>'; });
        return;
      }
      loadVideo(videoFile, torrent, folderId);
    })
    .catch(function(e) {
      tp.innerHTML = '<div class="torrent-status">Error: ' + e.message + '</div>';
    });
}

function loadVideo(videoFile, torrent, folderId) {
  var tp = document.getElementById('torrent-panel');
  if (!videoFile) {
    tp.innerHTML = '<div class="torrent-status">No video file found</div>';
    return;
  }

  var streamUrl = null;

  if (videoFile.presentation_urls && videoFile.presentation_urls.video && videoFile.presentation_urls.video.hls) {
    streamUrl = videoFile.presentation_urls.video.hls;
  } else {
    tp.innerHTML = '<div class="torrent-status">Getting download URL...</div>';
    fetch(SEEDR_API + '/hls?file_id=' + videoFile.id)
      .then(function(r) { return r.json() })
      .then(function(d) {
        if (d.url) startSeedrStream(d.url, torrent, folderId);
        else tp.innerHTML = '<div class="torrent-status">No stream URL</div>';
      });
    return;
  }

  if (streamUrl) startSeedrStream(streamUrl, torrent, folderId);
}

    quality: torrent.quality || 'HD',

  };
  _triedStreams = [];
  loadStream(stream);

function loadStream(stream) {
  var v = document.getElementById("player-video");
  v.pause(); v.src = ""; v.innerHTML = "";
  if (window._hls) { window._hls.destroy(); window._hls = null; }
  if (_failTimeout) { clearTimeout(_failTimeout); _failTimeout = null; }

  var url = stream.url;

  _failTimeout = setTimeout(function() { tryNextStream(stream, "timeout"); }, 30000);

  var gotData = false;
  v.addEventListener("loadeddata", function() {
    if (!gotData) { gotData = true; if (_failTimeout) { clearTimeout(_failTimeout); _failTimeout = null; } }
  }, { once: true });
  v.addEventListener("playing", function() {
    if (_failTimeout) { clearTimeout(_failTimeout); _failTimeout = null; }
  }, { once: true });
  v.addEventListener("timeupdate", function() {
    if (v.currentTime > 0 && _failTimeout) { clearTimeout(_failTimeout); _failTimeout = null; }
  }, { once: true });

  if (url.indexOf(".mp4") > -1 || stream.type === "mp4") {
    v.onerror = function() { if (_failTimeout) { clearTimeout(_failTimeout); _failTimeout = null; } v.onerror = null; v.src = ""; tryNextStream(stream, "error"); };
    v.src = url; v.load();
  } else if (window.Hls && window.Hls.isSupported() || v.canPlayType("application/vnd.apple.mpegurl")) {
    if (_failTimeout) { clearTimeout(_failTimeout); _failTimeout = null; }
    (function(s, u) {
      var _hlsStarted = false;
      var _hlsFallbackTimer = null;
      function loadWithHls() {
        if (_hlsStarted) return;
        if (window.Hls && window.Hls.isSupported()) {
          _hlsStarted = true;
          if (_failTimeout) { clearTimeout(_failTimeout); _failTimeout = null; }
          if (_hlsFallbackTimer) { clearTimeout(_hlsFallbackTimer); _hlsFallbackTimer = null; }
          var hls = new window.Hls(); window._hls = hls;
          hls.on(Hls.Events.ERROR, function(ev, data) {
            if (data.fatal) {
              if (_failTimeout) { clearTimeout(_failTimeout); _failTimeout = null; }
              hls.destroy(); window._hls = null;
              tryNextStream(s, "hls_error");
            }
          });
          hls.loadSource(u); hls.attachMedia(v);
        } else if (v.canPlayType("application/vnd.apple.mpegurl")) {
          _hlsStarted = true;
          if (_failTimeout) { clearTimeout(_failTimeout); _failTimeout = null; }
          if (_hlsFallbackTimer) { clearTimeout(_hlsFallbackTimer); _hlsFallbackTimer = null; }
          v.onerror = function() { if (_failTimeout) { clearTimeout(_failTimeout); _failTimeout = null; } v.onerror = null; v.src = ""; tryNextStream(s, "hls_error"); };
          v.src = u; v.load();
        } else if (!_hlsFallbackTimer) {
          _hlsFallbackTimer = setTimeout(function() { _hlsStarted = true; _hlsFallbackTimer = null; tryNextStream(s, "timeout"); }, 30000);
          setTimeout(loadWithHls, 200);
        }
      }
      loadWithHls();
    })(stream, url);
  } else if (v.canPlayType("application/vnd.apple.mpegurl")) {
    v.onerror = function() { if (_failTimeout) { clearTimeout(_failTimeout); _failTimeout = null; } v.onerror = null; v.src = ""; tryNextStream(stream, "hls_error"); };
    v.src = url; v.load();
  } else {
    document.getElementById("player-controls").innerHTML = '<span class="error">HLS not supported in this browser</span>';
  }
  
  setTimeout(function() { applySubs(); }, 200);
}

var _triedStreams = [];
function tryNextStream(current, reason) {
  if (current) _triedStreams.push(current);
  var next = null;
  for (var i = 0; i < CURRENT_STREAMS.length; i++) {
    var s = CURRENT_STREAMS[i];
    if (_triedStreams.indexOf(s) === -1) { next = s; break; }
  }
  if (next) {
    var sel = document.getElementById("server-select");
    if (sel && sel.options) {
      sel.selectedIndex = i;
      sel.style.color = "#f44";
    }
    var el = document.getElementById('torrent-panel');
    if (el) el.style.display = 'none';
    var pname = next._provider || "Source";
    var pq = next.quality || "";
    document.getElementById("player-info").innerHTML += " <span style='color:#f44;font-size:11px'>→ " + pname + (pq ? " " + pq : "") + "</span>";
    loadStream(next);
  } else {
    document.getElementById("player-controls").innerHTML += "<br><span class=\"error\">All servers failed</span>";
  }
}

    var muteData = { m: CURRENT_ANIME_ANILIST_ID, s: "COMPLETED" };
    anilistGraphQL("mutation ($m: Int, $s: MediaListStatus) { SaveMediaListEntry(mediaId: $m, status: $s) { id status } }", muteData, function(e, d) { if (!e) { loadAnilistSections(); loadAnilistStatus(CURRENT_ANIME_ANILIST_ID); } });
  } else if (total && CURRENT_EP_NUM < total) {
    setTimeout(nextEpisode, 1500);
  }
});

// Memory optimization - clear caches periodically
function clearOldCaches() {
  var now = Date.now();
  for (var key in _apiCache) {
    if (now - _apiCache[key].time > 7200000) { // 2 hours
      delete _apiCache[key];
    }
  }
  // Limit episode cache size
  var episodeCacheKeys = Object.keys(_episodeCache);
  if (episodeCacheKeys.length > 50) {
    for (var i = 0; i < episodeCacheKeys.length - 50; i++) {
      delete _episodeCache[episodeCacheKeys[i]];
    }
  }
}
setInterval(clearOldCaches, 600000); // Every 10 minutes

// Preload HLS script async for better performance
if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', function() {
    checkAnilistToken();
    loadHome();
  });
} else {
  checkAnilistToken();
  loadHome();
}
</script>
