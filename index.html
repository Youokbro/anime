<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>AnimeStream</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%}
body{background:#000;color:#eee;font-family:-apple-system,Helvetica,Arial,sans-serif;font-size:14px;overflow-x:hidden}
input,button{font-size:16px}
.page{display:none}
.page.active{display:block}

.nav{background:#050505;padding:10px 14px;display:table;width:100%;border-bottom:1px solid #222}
.nav-cell{display:table-cell;vertical-align:middle}
.nav-title{font-size:20px;font-weight:bold;color:#38bdf8}
.nav-back{padding:5px 10px;background:none;color:#38bdf8;border:1px solid #38bdf8;border-radius:4px;cursor:pointer;font-size:14px}

.search-wrap{padding:12px 14px;background:#050505}
.search-row{display:table;width:100%}
.search-row .c{display:table-cell;vertical-align:middle}
.search-row input{width:100%;padding:10px 12px;border:1px solid #333;border-radius:4px;background:#111;color:#eee;outline:none}
.search-row input:focus{border-color:#38bdf8}
.search-row button{padding:10px 16px;margin-left:6px;border:none;border-radius:4px;background:#38bdf8;color:#000;font-weight:bold;cursor:pointer}

.section-title{padding:14px 12px 8px;font-size:16px;font-weight:bold;color:#38bdf8}
.card-table{margin:0 6px 14px}
.card-table table{width:100%;border-collapse:collapse}
.card-table td{width:25%;padding:4px;text-align:center;vertical-align:top}
.poster-card{display:block;background:#0a0a0a;border-radius:4px;overflow:hidden;cursor:pointer;border:1px solid #1a1a1a}
.poster-card img{width:100%;display:block;min-height:140px;background:#111}
.poster-card .label{padding:6px 4px;font-size:11px;color:#ccc;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

.banner{width:100%;position:relative}
.banner img{width:100%;display:block}
.banner-overlay{background:linear-gradient(transparent,#000);padding:12px;position:absolute;bottom:0;left:0;right:0}
.banner-overlay h1{font-size:20px;color:#fff}
.detail-body{padding:12px}
.detail-desc{color:#aaa;font-size:13px;line-height:1.5;margin-bottom:12px}

.episode-table{width:100%;border-collapse:collapse}
.episode-table th{background:#0a0a0a;padding:8px 10px;text-align:left;font-size:12px;color:#888;border-bottom:1px solid #1a1a1a}
.episode-table td{padding:8px 10px;font-size:13px;border-bottom:1px solid #1a1a1a;cursor:pointer}
.episode-table tr:nth-child(odd) td{background:#0a0a0a}
.episode-table tr:nth-child(even) td{background:#050505}
.episode-table tr td:first-child{width:40px;color:#38bdf8;text-align:center}

.season-row{text-align:center;padding:8px 4px}
.season-btn{display:inline-block;padding:5px 12px;margin:3px;border:1px solid #444;border-radius:4px;background:#0a0a0a;color:#aaa;cursor:pointer;font-size:11px}
.season-btn.active{background:#38bdf8;color:#000;border-color:#38bdf8;font-weight:bold}

#player-page{position:fixed;top:0;left:0;right:0;bottom:0;z-index:100;background:#000}
#player-page video{width:100%;display:block;margin:0 auto;background:#000}
.player-top{background:#050505;padding:8px 12px;display:table;width:100%}
.player-top .c{display:table-cell;vertical-align:middle}
.player-info{font-size:13px;color:#eee;padding-left:10px}
.player-controls{text-align:center;padding:6px 8px;display:table;width:100%;background:#050505}
.player-controls .c{display:table-cell;vertical-align:middle;padding:0 4px}
.player-controls select{padding:4px 8px;background:#111;color:#eee;border:1px solid #333;border-radius:4px;font-size:13px}
.player-controls label{color:#aaa;font-size:12px}
.player-sub{text-align:center;padding:6px}
.player-sub select{padding:4px 8px;background:#111;color:#eee;border:1px solid #333;border-radius:4px;font-size:13px}
.ext-link{display:inline-block;padding:10px 20px;background:#38bdf8;color:#000;border-radius:4px;font-weight:bold;text-decoration:none;margin-top:10px}

@keyframes pulse{0%,100%{opacity:.4}50%{opacity:1}}
.loading{text-align:center;padding:30px;color:#666;animation:pulse 1.5s ease-in-out infinite}
.error{text-align:center;padding:30px;color:#f44;font-size:13px}

.btn-status{display:inline-block;padding:4px 10px;margin:2px;border:1px solid #333;border-radius:4px;background:#0a0a0a;color:#eee;cursor:pointer;font-size:12px;text-decoration:none}
.btn-status.active{background:#38bdf8;color:#000;border-color:#38bdf8;font-weight:bold}
.login-btn{display:inline-block;padding:4px 12px;background:#38bdf8;color:#000;border:none;border-radius:4px;cursor:pointer;font-weight:bold;font-size:12px;text-decoration:none}
.avatar-img{width:30px;height:30px;border-radius:50%;vertical-align:middle;border:2px solid #38bdf8}
.nav-right{text-align:right}
.logout-link{color:#888;font-size:11px;margin-left:6px;cursor:pointer;text-decoration:underline}
</style> 
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
</head>
<body>

<div id="home-page" class="page active">
  <div class="nav" style="display:table;width:100%"><div class="nav-cell nav-title">AnimeStream</div><div class="nav-cell nav-right" id="anilist-nav"></div></div>
  <div class="search-wrap">
    <div class="search-row">
      <div class="c" style="width:100%"><input id="home-search-input" type="text" placeholder="Search..." onkeydown="if(event.keyCode===13)doHomeSearch()"></div>
      <div class="c" style="width:auto"><button onclick="doHomeSearch()">Go</button></div>
    </div>
  </div>
  <div id="home-sections"><div id="anilist-sections"></div></div>
</div>

<div id="search-page" class="page">
  <div class="nav">
    <div class="nav-cell" style="width:auto"><button class="nav-back" onclick="showPage('home')">Back</button></div>
    <div class="nav-cell nav-title" style="padding-left:10px">Search</div>
  </div>
  <div class="search-wrap">
    <div class="search-row">
      <div class="c" style="width:100%"><input id="search-input" type="text" placeholder="Search..." onkeydown="if(event.keyCode===13)doSearch()"></div>
      <div class="c" style="width:auto"><button onclick="doSearch()">Go</button></div>
    </div>
  </div>
  <div id="search-results"></div>
</div>

<div id="detail-page" class="page">
  <div class="nav">
    <div class="nav-cell" style="width:auto"><button class="nav-back" onclick="showPage('home')">Back</button></div>
    <div class="nav-cell nav-title" style="padding-left:10px">Details</div>
  </div>
  <div id="detail-content"></div>
</div>

<div id="player-page" class="page">
  <div class="player-top">
    <div class="c" style="width:auto"><button class="nav-back" onclick="closePlayer()">Back</button></div>
    <div class="c player-info" id="player-info">Episode</div>
  </div>
  <video id="player-video" controls autoplay playsinline></video>
  <div id="player-controls" class="player-controls"></div>
  <div class="player-sub" id="player-subtitles"></div>
</div>

<script>
var API_BASE = "https://miruro-api-navy.vercel.app";
var PROXY_BASE = "https://anim-proxy.ahaantadi.workers.dev";
var CONSUMET_API = "https://anime-api-nu-eight.vercel.app";
var CURRENT_EPISODES = [];
var CURRENT_EPISODES_MAP = {};
var CURRENT_STREAMS = [];
var CURRENT_EP_PROVIDERS = {};
var CURRENT_SUBTITLES = [];
var CURRENT_REFERER = "";
var CURRENT_ANIME_ID = 0;
var CURRENT_ANIME_TITLE = "";
var CURRENT_ANIME_ROMAJI = "";
var CURRENT_HIANIME_EPS = []; // hiAnime episode fallback data
var CURRENT_PROVIDER = "AnimeSaturn";
var PROVIDERS = ["hop", "bonk", "pewe", "bee", "moo", "kiwi", "ally"];
var _lastPage = "home";

function apiGet(path, cb) {
  var x = new XMLHttpRequest();
  x.open("GET", API_BASE + path, true);
  x.onreadystatechange = function() {
    if (x.readyState === 4) {
      if (x.status === 200) { try { cb(null, JSON.parse(x.responseText)); } catch(e) { cb("Parse error"); } }
      else { cb("Error " + x.status); }
    }
  };
  x.send();
}

function consumetGet(path, cb) {
  var x = new XMLHttpRequest();
  x.open("GET", CONSUMET_API + path, true);
  x.onreadystatechange = function() {
    if (x.readyState === 4) {
      if (x.status === 200) { try { cb(null, JSON.parse(x.responseText)); } catch(e) { cb("Parse error"); } }
      else { cb("Error " + x.status); }
    }
  };
  x.send();
}

var ANILIST_CLIENT_ID = "43388";
var ANILIST_TOKEN = localStorage.getItem("anilist_token") || "";
var ANILIST_USER = null;

function checkAnilistToken() {
  var h = window.location.hash;
  if (h.indexOf("access_token=") > -1) {
    var m = h.match(/access_token=([^&]+)/);
    if (m) {
      ANILIST_TOKEN = m[1];
      localStorage.setItem("anilist_token", ANILIST_TOKEN);
      history.replaceState(null, "", window.location.pathname + window.location.search);
    }
  }
  anilistRefresh();
}

function anilistLogin() {
  window.location.href = "https://anilist.co/api/v2/oauth/authorize?client_id=" + ANILIST_CLIENT_ID + "&response_type=token";
}

function anilistLogout() {
  ANILIST_TOKEN = ""; ANILIST_USER = null;
  localStorage.removeItem("anilist_token");
  location.reload();
}

function anilistGraphQL(query, vars, cb) {
  var x = new XMLHttpRequest();
  x.open("POST", "https://graphql.anilist.co", true);
  x.setRequestHeader("Content-Type", "application/json");
  x.setRequestHeader("Accept", "application/json");
  if (ANILIST_TOKEN) x.setRequestHeader("Authorization", "Bearer " + ANILIST_TOKEN);
  x.onreadystatechange = function() {
    if (x.readyState === 4) {
      if (x.status === 200) { try { cb(null, JSON.parse(x.responseText).data); } catch(e) { cb("Parse error"); } }
      else { cb("Error " + x.status); }
    }
  };
  x.send(JSON.stringify({ query: query, variables: vars || {} }));
}

function anilistRefresh() {
  var nav = document.getElementById("anilist-nav");
  if (!nav) return;
  if (!ANILIST_TOKEN) { nav.innerHTML = '<a class="login-btn" href="javascript:anilistLogin()">Login</a>'; return; }
  nav.innerHTML = '<span class="loading" style="font-size:11px;color:#888">Loading...</span>';
  anilistGraphQL("query { Viewer { id name avatar { large } } }", {}, function(err, data) {
    if (err || !data || !data.Viewer) {
      ANILIST_TOKEN = ""; localStorage.removeItem("anilist_token");
      nav.innerHTML = '<a class="login-btn" href="javascript:anilistLogin()">Login</a>';
      return;
    }
    ANILIST_USER = data.Viewer;
    var a = data.Viewer.avatar;
    var img = (a && a.large) ? '<img class="avatar-img" src="' + a.large + '" alt=""> ' : "";
    nav.innerHTML = img + '<span style="font-size:12px;color:#eee">' + data.Viewer.name + '</span> <span class="logout-link" onclick="anilistLogout()">(logout)</span>';
    loadAnilistSections();
  });
}

function loadAnilistSections() {
  var sec = document.getElementById("anilist-sections");
  if (!sec) return;
  anilistGraphQL("query ($u: Int) { MediaListCollection(userId: $u, type: ANIME) { lists { name entries { id progress media { id title { romaji english } coverImage { large } episodes } } } } }", { u: ANILIST_USER.id }, function(err, data) {
    if (err || !data || !data.MediaListCollection) return;
    var lists = data.MediaListCollection.lists || [];
    var html = "";
    for (var i = 0; i < lists.length; i++) {
      var list = lists[i];
      var name = list.name || "";
      var entries = list.entries || [];
      if (!entries.length) continue;
      var label = "";
      if (name === "CURRENT") label = "Continue Watching";
      else if (name === "PLANNING") label = "My List";
      else continue;
      html += '<div class="section-title">' + label + '</div><div class="card-table"><table><tr>';
      for (var j = 0; j < entries.length && j < 20; j++) {
        var e = entries[j];
        var m = e.media || {};
        var img = (m.coverImage && m.coverImage.large) || "";
        var t = m.title ? (m.title.english || m.title.romaji || "") : "";
        var ep = m.episodes || "?";
        var prog = e.progress || 0;
        html += '<td><div class="poster-card" onclick="openDetail(' + m.id + ')">';
        if (img) html += '<img src="' + img + '" alt="" onerror="this.style.display=\"none\"">';
        else html += '<div style="height:140px;background:#111"></div>';
        html += '<div class="label">' + t + '</div>';
        if (name === "CURRENT") html += '<div style="font-size:10px;color:#38bdf8">Ep ' + prog + '/' + ep + '</div>';
        html += '</div></td>';
        if ((j + 1) % 4 === 0 && j < entries.length - 1) html += '</tr><tr>';
      }
      html += '</tr></table></div>';
    }
    if (html) sec.innerHTML = html + (sec.innerHTML || "");
  });
}

function loadAnilistStatus(mediaId) {
  var el = document.getElementById("anilist-status");
  if (!el || !ANILIST_TOKEN) return;
  anilistGraphQL("query ($id: Int, $u: Int) { Media(id: $id) { mediaListEntry { id status progress } } }", { id: parseInt(mediaId, 10), u: ANILIST_USER ? ANILIST_USER.id : 0 }, function(err, data) {
    if (err || !data || !data.Media) return;
    var entry = data.Media.mediaListEntry;
    var cur = entry ? entry.status : "";
    var prog = entry ? (entry.progress || 0) : 0;
    var statuses = ["CURRENT", "PLANNING", "COMPLETED", "DROPPED", "PAUSED"];
    var labels = ["Watching", "Planning", "Completed", "Dropped", "Paused"];
    var html = '<div class="section-title" style="margin-top:8px">AniList Status</div><div class="status-row">';
    for (var i = 0; i < statuses.length; i++) {
      var active = statuses[i] === cur ? ' active' : '';
      html += '<a class="btn-status' + active + '" href="javascript:saveAnilistStatus(' + mediaId + ',\""' + statuses[i] + '\"")">' + labels[i] + '</a> ';
    }
    if (entry) html += '<span style="font-size:11px;color:#888;margin-left:8px">Progress: ' + prog + '</span>';
    html += '</div>';
    el.innerHTML = html;
  });
}

function saveAnilistStatus(mediaId, status) {
  anilistGraphQL("mutation ($m: Int, $s: MediaListStatus) { SaveMediaListEntry(mediaId: $m, status: $s) { id status progress } }", { m: parseInt(mediaId, 10), s: status }, function(err, data) {
    if (err) { alert("Failed to update AniList"); return; }
    loadAnilistStatus(mediaId);
    loadAnilistSections();
  });
}


function showPage(name) {
  var pages = ["home","search","detail","player"];
  for (var i = 0; i < pages.length; i++) document.getElementById(pages[i] + "-page").className = "page";
  document.getElementById(name + "-page").className = "page active";
  document.body.style.overflow = (name === "player") ? "hidden" : "";
}

function doHomeSearch() {
  var q = document.getElementById("home-search-input").value.trim();
  if (q.length > 0) { document.getElementById("search-input").value = q; doSearch(); }
}

function getTitle(i) {
  var t = i.title;
  if (typeof t === "string") return t;
  if (t && typeof t === "object") return t.english || t.romaji || t.userPreferred || t.native || "";
  return i.name || "";
}

function getImg(i) {
  var c = i.coverImage;
  if (c && typeof c === "object") return c.large || c.extraLarge || c.medium || "";
  return i.image || i.cover || i.poster || "";
}

function buildSection(title, data) {
  var r = data.results || [];
  if (!r.length) return "";
  var h = '<div class="section-title">' + title + '</div><div class="card-table"><table><tr>';
  for (var i = 0; i < r.length; i++) {
    var id = r[i].id || 0;
    h += '<td><div class="poster-card" onclick="openDetail(' + id + ')">';
    h += '<img src="' + getImg(r[i]) + '" alt="" onerror="this.style.display=\'none\'">';
    h += '<div class="label">' + getTitle(r[i]) + '</div></div></td>';
    if ((i + 1) % 4 === 0 && i < r.length - 1) h += '</tr><tr>';
  }
  return h + '</tr></table></div>';
}

function loadHome() {
  var c = document.getElementById("home-sections");
  c.innerHTML = '<div class="loading">Loading...</div>';
  _homeResults = [];
  var queries = [
    { t: "Trending", q: "{ Page(page: 1, perPage: 20) { media(sort: TRENDING_DESC, type: ANIME) { id title { romaji english } coverImage { large } } } }" },
    { t: "Popular", q: "{ Page(page: 1, perPage: 20) { media(sort: POPULARITY_DESC, type: ANIME) { id title { romaji english } coverImage { large } } } }" }
  ];
  var loaded = 0;
  var html = "";
  for (var i = 0; i < queries.length; i++) {
    (function(idx) {
      anilistGraphQL(queries[idx].q, {}, function(err, data) {
        loaded++;
        if (!err && data && data.Page && data.Page.media) {
          var items = data.Page.media;
          var h = '<div class="section-title">' + queries[idx].t + '</div><div class="card-table"><table><tr>';
          for (var j = 0; j < items.length; j++) {
            var m = items[j];
            var img = m.coverImage ? (m.coverImage.large || "") : "";
            var t = getTitle(m);
            h += '<td><div class="poster-card" onclick="openHomeResult(' + _homeResults.length + ')">';
            if (img) h += '<img src="' + img + '" alt="" onerror="this.style.display=\'none\'">';
            else h += '<div style="height:140px;background:#111"></div>';
            h += '<div class="label">' + t + '</div></div></td>';
            if ((j + 1) % 4 === 0 && j < items.length - 1) h += '</tr><tr>';
            _homeResults.push(m);
          }
          html += h + '</tr></table></div>';
        }
        if (loaded === queries.length) c.innerHTML = html || '<div class="error">AniList API error</div>';
      });
    })(i);
  }
}
function openHomeResult(idx) {
  var media = _homeResults[idx];
  if (!media) return;
  var title = getTitle(media);
  var c = document.getElementById("detail-content");
  c.innerHTML = '<div class="loading">Looking for streams...</div>';
  showPage("detail");
  _lastPage = "detail";
  apiGet("/search?query=" + encodeURIComponent(title) + "&per_page=5", function(err, data) {
    if (!err && data.results && data.results.length) {
      openDetail(data.results[0].id);
    } else if (media.title && media.title.romaji && media.title.romaji !== title) {
      apiGet("/search?query=" + encodeURIComponent(media.title.romaji) + "&per_page=5", function(err2, data2) {
        if (!err2 && data2.results && data2.results.length) {
          openDetail(data2.results[0].id);
        } else {
          showAnilistDetail(media);
        }
      });
    } else {
      showAnilistDetail(media);
    }
  });
}


function doSearch() {
  var q = document.getElementById("search-input").value.trim();
  if (!q.length) return;
  var c = document.getElementById("search-results");
  c.innerHTML = '<div class="loading">Searching AniList...</div>';
  _lastPage = "search";
  showPage("search");
  anilistGraphQL('query ($q: String) { Page(page: 1, perPage: 20) { media(search: $q, type: ANIME) { id title { romaji english } coverImage { large } description } } }', { q: q }, function(err, data) {
    if (err || !data.Page || !data.Page.media || !data.Page.media.length) {
      c.innerHTML = '<div class="error">No results. Try different spelling?</div>';
      return;
    }
    _lastAnilistSearch = data.Page.media;
    var html = '<div class="section-title">Results</div><div class="card-table"><table><tr>';
    for (var i = 0; i < data.Page.media.length; i++) {
      var m = data.Page.media[i];
      var img = m.coverImage ? (m.coverImage.large || "") : "";
      var t = getTitle(m);
      html += '<td><div class="poster-card" onclick="openAnilistResult(' + i + ')">';
      if (img) html += '<img src="' + img + '" alt="" onerror="this.style.display=\'none\'">';
      else html += '<div style="height:140px;background:#111"></div>';
      html += '<div class="label">' + t + '</div></div></td>';
      if ((i + 1) % 4 === 0 && i < data.Page.media.length - 1) html += '</tr><tr>';
    }
    c.innerHTML = html + '</tr></table></div>';
  });
}

function openDetail(id) {
  CURRENT_ANIME_ID = id;
  _lastPage = "detail";
  showPage("detail");
  var c = document.getElementById("detail-content");
  c.innerHTML = '<div class="loading">Loading...</div>';
  CURRENT_EPISODES = [];
  CURRENT_EPISODES_MAP = {};
  apiGet("/info/" + id, function(err, info) {
    if (err) { c.innerHTML = '<div class="error">' + err + '</div>'; return; }
    var img = getImg(info);
    var title = getTitle(info);
    CURRENT_ANIME_TITLE = title;
    CURRENT_ANIME_ROMAJI = (info.title && info.title.romaji) || title;
    var desc = (info.description || "").replace(/<[^>]*>/g, "");
    var html = '';
    if (img) html += '<div class="banner"><img src="' + img + '" alt=""><div class="banner-overlay"><h1>' + title + '</h1></div></div>';
    else html += '<div class="detail-body"><h1 style="padding:12px;font-size:20px;color:#38bdf8">' + title + '</h1>';
    html += '<div class="detail-body">';
    if (desc) html += '<div class="detail-desc">' + desc + '</div>';
    html += '<div class="section-title">Episodes</div><div id="ep-list"><div class="loading">Loading episodes...</div></div><div id="anilist-status"></div></div>';
    c.innerHTML = html;
    apiGet("/episodes/" + id, function(err2, eps) {
      var el = document.getElementById("ep-list");
      if (err2) { loadHianimeEpisodes(); return; }
      var provs = eps.providers || {};
      // Merge episodes from ALL providers by number
      var flat = [];
      var byNum = {};
      for (var o = PROVIDERS.length - 1; o >= 0; o--) {
        var p = PROVIDERS[o];
        if (!provs[p] || !provs[p].episodes) continue;
        var cats = provs[p].episodes;
        for (var cat in cats) {
          var list = cats[cat];
          if (!list || !list.length) continue;
          for (var k = 0; k < list.length; k++) {
            var ep = list[k];
            var num = ep.number || (k + 1);
            if (!byNum[num]) {
              ep._provider = p;
              ep._category = cat;
              ep._epNum = num;
              byNum[num] = ep;
            }
          }
        }
      }
      var epProvs = {};
      for (var o = PROVIDERS.length - 1; o >= 0; o--) {
        var p = PROVIDERS[o];
        if (!provs[p] || !provs[p].episodes) continue;
        var cats = provs[p].episodes;
        for (var cat in cats) {
          var list = cats[cat];
          if (!list || !list.length) continue;
          for (var k = 0; k < list.length; k++) {
            var ep = list[k];
            var num = ep.number || (k + 1);
            if (!epProvs[num]) epProvs[num] = [];
            epProvs[num].push({ provider: p, id: ep.id || '', category: cat, number: num });
          }
        }
      }
      CURRENT_EP_PROVIDERS = epProvs;
      for (var n in byNum) flat.push(byNum[n]);
      flat.sort(function(a, b) { return a._epNum - b._epNum; });

      if (!flat.length) { el.innerHTML = '<div class="error">No episodes</div>'; return; }
      CURRENT_EPISODES = flat;
      CURRENT_EPISODES_MAP = byNum;
      var tbl = '<table class="episode-table"><tr><th>#</th><th>Title</th><th>Aired</th></tr>';
      for (var i = 0; i < flat.length; i++) {
        var ep = flat[i];
        var num = ep._epNum;
        var ttl = ep.title || "Episode " + num;
        var aired = ep.airDate || ep.releaseDate || "-";
        var eid = ep.id || "";
        tbl += '<tr onclick="playEpisode(' + num + ')">';
        tbl += '<td>' + num + '</td><td>' + ttl + '</td><td>' + aired + '</td></tr>';
      }
      el.innerHTML = tbl + '</table>';
      // background search Consumet for AnimeSaturn server option
      (function() {
        var sq = CURRENT_ANIME_TITLE;
        (function tryCS(q) {
          consumetGet("/search?q=" + encodeURIComponent(q), function(e, d) {
            if (d && d.results && d.results.length) {
              HIANIME_ID = d.results[0].id;
              CURRENT_PROVIDER = d._provider || "AnimeSaturn";
              consumetGet("/info?id=" + HIANIME_ID + "&provider=" + CURRENT_PROVIDER, function(e2, ci) {
                if (ci && ci.episodes) CURRENT_HIANIME_EPS = ci.episodes;
              });
            } else if (CURRENT_ANIME_ROMAJI && q !== CURRENT_ANIME_ROMAJI) {
              tryCS(CURRENT_ANIME_ROMAJI);
            }
          });
        })(sq);
      })();
    });
  });
}

function openAnilistResult(idx) {
  var media = _lastAnilistSearch[idx];
  if (!media) return;
  var title = getTitle(media);
  var c = document.getElementById("detail-content");
  c.innerHTML = '<div class="loading">Looking for streams...</div>';
  showPage("detail");
  _lastPage = "detail";
  apiGet("/search?query=" + encodeURIComponent(title) + "&per_page=5", function(err, data) {
    if (!err && data.results && data.results.length) {
      openDetail(data.results[0].id);
    } else if (media.title && media.title.romaji && media.title.romaji !== title) {
      apiGet("/search?query=" + encodeURIComponent(media.title.romaji) + "&per_page=5", function(err2, data2) {
        if (!err2 && data2.results && data2.results.length) {
          openDetail(data2.results[0].id);
        } else {
          showAnilistDetail(media);
        }
      });
    } else {
      showAnilistDetail(media);
    }
  });
}

function showAnilistDetail(media) {
  CURRENT_ANIME_ID = media.id;
  CURRENT_ANIME_TITLE = getTitle(media);
  CURRENT_ANIME_ROMAJI = (media.title && media.title.romaji) || CURRENT_ANIME_TITLE;
  CURRENT_HIANIME_EPS = [];
  HIANIME_ID = "";
  _lastPage = "detail";
  showPage("detail");
  var c = document.getElementById("detail-content");
  var img = getImg(media);
  var title = getTitle(media);
  var desc = (media.description || "").replace(/<[^>]*>/g, "");
  var html = '';
  if (img) html += '<div class="banner"><img src="' + img + '" alt=""><div class="banner-overlay"><h1>' + title + '</h1></div></div>';
  else html += '<div class="detail-body"><h1 style="padding:12px;font-size:20px;color:#38bdf8">' + title + '</h1>';
  html += '<div class="detail-body">';
  if (desc) html += '<div class="detail-desc">' + desc + '</div>';
  html += '<div class="section-title">Episodes</div><div id="season-tabs"></div><div id="ep-list"><div class="loading">Loading episodes...</div></div><div id="anilist-status"></div></div>';
  c.innerHTML = html;
  loadAnilistStatus(media.id);
  loadSeasonRelations(media.id);
  doConsumetSearch(CURRENT_ANIME_TITLE, function() {
    if (CURRENT_ANIME_ROMAJI && CURRENT_ANIME_ROMAJI !== CURRENT_ANIME_TITLE) {
      doConsumetSearch(CURRENT_ANIME_ROMAJI, function() {
        document.getElementById("ep-list").innerHTML = '<div class="error">No Consumet episodes found</div>';
      });
    } else {
      document.getElementById("ep-list").innerHTML = '<div class="error">No Consumet episodes found</div>';
    }
  });
}

var _seasonList = [];

function loadSeasonRelations(mediaId) {
  _seasonList = [];
  anilistGraphQL("query ($id: Int) { Media(id: $id) { relations { edges { relationType node { id title { romaji english } type } } } } }", { id: mediaId }, function(err, data) {
    if (err || !data.Media || !data.Media.relations) return;
    var edges = data.Media.relations.edges || [];
    var related = [];
    for (var i = 0; i < edges.length; i++) {
      var e = edges[i];
      if (e.node.type !== "ANIME") continue;
      var rt = e.relationType;
      if (rt === "SEQUEL" || rt === "PREQUEL" || rt === "SIDE_STORY") {
        var t = e.node.title.english || e.node.title.romaji || "";
        var label = rt === "SEQUEL" ? "Season " + (related.length + 2) : rt === "PREQUEL" ? "Prequel" : "Side Story";
        related.push({ id: e.node.id, title: t, label: label, relType: rt });
      }
    }
    if (!related.length) return;
    _seasonList = [{ id: mediaId, title: CURRENT_ANIME_TITLE, label: "Main", relType: "" }].concat(related);
    var html = '<div class="season-row">';
    for (var s = 0; s < _seasonList.length; s++) {
      html += '<span class="season-btn' + (s === 0 ? " active" : "") + '" onclick="switchSeason(' + s + ')">' + _seasonList[s].label + '</span>';
    }
    html += '</div>';
    document.getElementById("season-tabs").innerHTML = html;
  });
}

function switchSeason(idx) {
  var s = _seasonList[idx];
  if (!s) return;
  document.getElementById("season-tabs").innerHTML = "";
  document.getElementById("ep-list").innerHTML = '<div class="loading">Loading ' + s.label + '...</div>';
  CURRENT_ANIME_TITLE = s.title;
  CURRENT_ANIME_ID = s.id;
  CURRENT_HIANIME_EPS = [];
  HIANIME_ID = "";
  doConsumetSearch(s.title, function() {
    document.getElementById("ep-list").innerHTML = '<div class="error">No episodes for this season</div>';
  });
  // Update active tab highlight
  var btns = document.querySelectorAll(".season-btn");
  for (var b = 0; b < btns.length; b++) btns[b].className = "season-btn";
  if (btns[idx]) btns[idx].className = "season-btn active";
}

function streamHiVideo(src) {
  var v = document.getElementById("player-video");
  v.pause(); v.src = ""; v.innerHTML = "";
  if (window._hls) { window._hls.destroy(); window._hls = null; }
  var url = src.url;
  var ref = src._provider === "AnimeUnity" ? "https://www.animeunity.to" : src._provider === "AnimeSaturn" ? "https://www.animesaturn.cx" : "https://www.animesaturn.cx";
  var proxyUrl = PROXY_BASE + "/proxy?url=" + encodeURIComponent(url) + "&referer=" + encodeURIComponent(ref);
  v.crossOrigin = "anonymous";
  if (src.isM3U8 || url.indexOf(".m3u8") > -1) {
    if (v.canPlayType("application/vnd.apple.mpegurl")) {
      v.onerror = function() { v.onerror = null; v.src = ""; tryNextStream(src); };
      v.src = proxyUrl; v.load();
    } else if (window.Hls && window.Hls.isSupported()) {
      var hls = new window.Hls(); window._hls = hls;
      hls.on(Hls.Events.ERROR, function(ev, data) {
        if (data.fatal) { hls.destroy(); window._hls = null; tryNextStream(src); }
      });
      hls.loadSource(proxyUrl); hls.attachMedia(v);
    } else {
      document.getElementById("player-controls").innerHTML += '<br><span class="error">HLS not supported</span>';
    }
  } else {
    v.src = proxyUrl; v.load();
  }
}

function switchHiSource() {
  var sel = document.getElementById("hi-server-select");
  if (!sel) return;
  var idx = parseInt(sel.value, 10);
  var src = CURRENT_STREAMS[idx];
  if (src) streamHiVideo(src);
}

function playEpisode(num) {
  HI_FAILED = false;
  var ep = CURRENT_EPISODES_MAP[num];
  if (!ep) return;
  var eid = ep.id || "";
  var provider = ep._provider || "unknown";
  showPage("player");
  var v = document.getElementById("player-video");
  v.pause(); v.src = ""; v.innerHTML = "";
  if (window._hls) { window._hls.destroy(); window._hls = null; }
  document.getElementById("player-info").innerHTML = CURRENT_ANIME_TITLE + " - Ep " + num;
  document.getElementById("player-controls").innerHTML = '<span class="loading">Loading...</span>';
  document.getElementById("player-subtitles").innerHTML = "";
  apiGet("/" + eid, function(err, data) {
    var controlsEl = document.getElementById("player-controls");
    if (err) {
      if (HI_FAILED) {
        controlsEl.innerHTML = '<div class="error">Stream unavailable from all sources</div><br><a class="ext-link" href="https://miruro.tv/search?q=' + encodeURIComponent(CURRENT_ANIME_TITLE) + '" target="_blank">Open on Miruro.to</a>';
        return;
      }
      // Try HiAnime fallback
      if (CURRENT_HIANIME_EPS.length) { playHianimeEpisode(num); return; }
      // Otherwise search once
      if (!HIANIME_ID) {
        var searchQ = CURRENT_ANIME_TITLE;
        var triedRomaji = false;
        (function doSearch() {
          consumetGet("/search?q=" + encodeURIComponent(searchQ), function(err2, sd) {
            if (sd && sd.results && sd.results.length) {
              HIANIME_ID = sd.results[0].id;
              CURRENT_PROVIDER = sd._provider || sd.results[0]._provider || "AnimeSaturn";
              consumetGet("/info?id=" + HIANIME_ID + "&provider=" + CURRENT_PROVIDER, function(err3, info) {
                if (info && info.episodes) CURRENT_HIANIME_EPS = info.episodes;
                playHianimeEpisode(num);
              });
            } else if (!triedRomaji && CURRENT_ANIME_ROMAJI && CURRENT_ANIME_ROMAJI !== CURRENT_ANIME_TITLE) {
              triedRomaji = true;
              searchQ = CURRENT_ANIME_ROMAJI;
              doSearch();
            } else {
              var mu = "https://miruro.tv/search?q=" + encodeURIComponent(CURRENT_ANIME_TITLE);
              controlsEl.innerHTML = 'This episode is from <b>' + provider + '</b> (API failed). '
                + '<br><br><a class="ext-link" href="' + mu + '" target="_blank">Open on Miruro.to</a>';
            }
          });
        })();
      } else {
        playHianimeEpisode(num);
      }
      return;
    }
    var streams = data.streams || [];
    var subs = data.subtitles || [];
    CURRENT_SUBTITLES = subs;

    var playable = [];
    for (var s = 0; s < streams.length; s++) {
      if (streams[s].type !== "embed") playable.push(streams[s]);
    }
    if (!playable.length) {
      var embedUrl = "";
      for (var s = 0; s < streams.length; s++) {
        if (streams[s].type === "embed") { embedUrl = streams[s].url; break; }
      }
      var html = '<div style="text-align:center;padding:10px">';
      if (embedUrl) {
        html += '<a class="ext-link" href="' + embedUrl + '" target="_blank">Open player in new tab</a><br><br>';
      } else {
        html += '<div class="error">No playable streams from this provider</div><br>';
      }
      html += '<button class="ext-link" onclick="playHianimeEpisode(' + num + ')" style="background:#555;cursor:pointer">Try HiAnime</button>';
      controlsEl.innerHTML = html + '</div>';
      return;
    }
    CURRENT_STREAMS = playable;

    var controlsHtml = '<div class="c" style="width:auto"><label>Quality:</label></div><div class="c" style="width:auto">';
    controlsHtml += '<select id="quality-select" onchange="changeQuality()">';
    for (var q = 0; q < playable.length; q++) {
      var qlabel = playable[q].quality || "Auto";
      var typeLabel = playable[q].type === "mp4" ? "MP4" : "HLS";
      controlsHtml += '<option value="' + q + '"' + (q === 0 ? " selected" : "") + ">" + qlabel + " (" + typeLabel + ")</option>";
    }
    controlsHtml += '</select></div>';

    if (subs.length) {
      controlsHtml += '<div class="c" style="width:auto"><label>Subs:</label></div><div class="c" style="width:auto">';
      controlsHtml += '<select onchange="changeSub(this.value)"><option value="">None</option>';
      for (var j = 0; j < subs.length; j++) {
        controlsHtml += '<option value="' + j + '">' + (subs[j].label || "Sub " + (j+1)) + "</option>";
      }
      controlsHtml += '</select></div>';
    }
    var curProv = ep._provider || "unknown";
    var allProvs = CURRENT_EP_PROVIDERS[num] || [];
    var hasAnimeSaturn = false;
    for (var hi = 0; hi < CURRENT_HIANIME_EPS.length; hi++) {
      if (CURRENT_HIANIME_EPS[hi].number === num) { hasAnimeSaturn = true; break; }
    }
    if (allProvs.length > 0 || hasAnimeSaturn) {
      controlsHtml += '<div class="c" style="width:auto"><label>Server:</label></div><div class="c" style="width:auto">';
      controlsHtml += '<select id="server-select" onchange="switchServer(' + num + ')">';
      for (var sp = 0; sp < allProvs.length; sp++) {
        var provName = allProvs[sp].provider;
        var sel = provName === curProv ? " selected" : "";
        controlsHtml += '<option value="' + sp + '"' + sel + '>' + provName + '</option>';
      }
      if (hasAnimeSaturn) {
        controlsHtml += '<option value="hi">AnimeSaturn</option>';
      }
      controlsHtml += '</select></div>';
    }
    controlsEl.innerHTML = controlsHtml;
    if (v.canPlayType("application/vnd.apple.mpegurl") === "") {
      for (var i = 0; i < playable.length; i++) {
        if (playable[i].type === "mp4" && playable[i].url.indexOf("Authorization=") < 0) { loadStream(playable[i]); return; }
      }
    }
    loadStream(playable[0]);
  });
}

function loadStream(stream) {
  var v = document.getElementById("player-video");
  v.pause(); v.src = ""; v.innerHTML = "";
  if (window._hls) { window._hls.destroy(); window._hls = null; }

  var url = stream.url;
  var referer = stream.referer || CURRENT_REFERER || "";
  var proxyUrl = PROXY_BASE + "/proxy?url=" + encodeURIComponent(url) + "&referer=" + encodeURIComponent(referer);
  v.crossOrigin = "anonymous";

  if (url.indexOf(".mp4") > -1 || stream.type === "mp4") {
    v.onerror = function() { v.onerror = null; v.src = ""; tryNextStream(stream); };
    v.src = proxyUrl; v.load();
  } else if (v.canPlayType("application/vnd.apple.mpegurl")) {
    v.src = proxyUrl; v.load();
  } else if (window.Hls && window.Hls.isSupported()) {
    var hls = new window.Hls(); window._hls = hls;
    hls.on(Hls.Events.ERROR, function(ev, data) {
      if (data.fatal) {
        hls.destroy(); window._hls = null;
        tryNextStream(stream);
      }
    });
    hls.loadSource(proxyUrl); hls.attachMedia(v);
  } else {
    document.getElementById("player-controls").innerHTML = '<span class="error">HLS not supported in this browser</span>';
  }
}

function tryNextStream(current) {
  var idx = -1;
  for (var i = 0; i < CURRENT_STREAMS.length; i++) {
    if (CURRENT_STREAMS[i] === current) { idx = i; break; }
  }
  if (idx >= 0 && idx + 1 < CURRENT_STREAMS.length) {
    var next = CURRENT_STREAMS[idx + 1];
    var hiSelect = document.getElementById("hi-server-select");
    if (hiSelect) {
      if (hiSelect.options) hiSelect.selectedIndex = idx + 1;
      streamHiVideo(next);
    } else {
      loadStream(next);
    }
  } else {
    document.getElementById("player-controls").innerHTML += "<br><span class=\"error\">Try another server above</span>";
  }
}

function changeQuality() {
  var sel = document.getElementById("quality-select");
  if (!sel) return;
  var idx = parseInt(sel.value, 10);
  var s = CURRENT_STREAMS[idx];
  if (s) loadStream(s);
}

function changeSub(val) {
  var v = document.getElementById("player-video");
  var t = v.getElementsByTagName("track");
  while (t.length) v.removeChild(t[0]);
  if (val === "") return;
  var s = CURRENT_SUBTITLES[parseInt(val, 10)];
  if (!s || !s.file) return;
  var tr = document.createElement("track");
  tr.kind = "subtitles"; tr.label = s.label || "Subs"; tr.srclang = "en"; tr.src = s.file; tr.default = true;
  v.appendChild(tr);
}

function switchServer(num) {
  var sel = document.getElementById("server-select");
  if (!sel) return;
  var val = sel.value;
  if (val === "hi") { playHianimeEpisode(num); return; }
  var idx = parseInt(val, 10);
  var provs = CURRENT_EP_PROVIDERS[num] || [];
  if (idx >= 0 && idx < provs.length) {
    var p = provs[idx];
    var ep = CURRENT_EPISODES_MAP[num];
    if (ep) {
      ep._provider = p.provider;
      ep._category = p.category;
      ep.id = p.id;
      playEpisode(num);
    }
  }
}

function closePlayer() {
  var v = document.getElementById("player-video");
  v.pause(); v.src = "";
  if (window._hls) { window._hls.destroy(); window._hls = null; }
  showPage("detail");
}

var HI_FAILED = false; // prevents re-entering Consumet after failure
var _lastAnilistSearch = [];

var _homeResults = [];

// HiAnime fallback
var HIANIME_ID = "";
function doConsumetSearch(query, fallback) {
  consumetGet("/search?q=" + encodeURIComponent(query), function(err, data) {
    if (err || !data.results || !data.results.length) {
      if (fallback) { fallback(); return; }
      document.getElementById("ep-list").innerHTML = '<div class="error">No Consumet episodes found</div>';
      return;
    }
    HIANIME_ID = data.results[0].id;
    CURRENT_PROVIDER = data._provider || data.results[0]._provider || "AnimeSaturn";
    consumetGet("/info?id=" + HIANIME_ID + "&provider=" + CURRENT_PROVIDER, function(err2, info) {
      var el = document.getElementById("ep-list");
      if (err2 || !info.episodes || !info.episodes.length) {
        el.innerHTML = '<div class="error">No episodes (provider has none)</div>';
        return;
      }
      CURRENT_HIANIME_EPS = info.episodes;
      var tbl = '<table class="episode-table"><tr><th>#</th><th>Title</th><th>Source</th></tr>';
      for (var i = 0; i < info.episodes.length; i++) {
        var ep = info.episodes[i];
        var num = ep.number;
        var ttl = "Episode " + num;
        tbl += '<tr onclick="playHianimeEpisode(' + num + ')">';
        tbl += '<td>' + num + '</td><td>' + ttl + '</td><td><span style="color:#38bdf8">Consumet</span></td></tr>';
      }
      el.innerHTML = tbl + '</table>';
    });
  });
}

function loadHianimeEpisodes() {
  var el = document.getElementById("ep-list");
  el.innerHTML = '<div class="loading">Loading episodes (Consumet)...</div>';
  doConsumetSearch(CURRENT_ANIME_TITLE, function() {
    if (CURRENT_ANIME_ROMAJI && CURRENT_ANIME_ROMAJI !== CURRENT_ANIME_TITLE) {
      el.innerHTML = '<div class="loading">Trying alternate title...</div>';
      doConsumetSearch(CURRENT_ANIME_ROMAJI, null);
    } else {
      el.innerHTML = '<div class="error">No Consumet episodes found</div>';
    }
  });
}

function playHianimeEpisode(num) {
  HI_FAILED = false;
  showPage("player");
  var v = document.getElementById("player-video");
  v.pause(); v.src = ""; v.innerHTML = "";
  if (window._hls) { window._hls.destroy(); window._hls = null; }
  document.getElementById("player-info").innerHTML = CURRENT_ANIME_TITLE + " - Ep " + num + " (HiAnime)";
  document.getElementById("player-controls").innerHTML = '<span class="loading">Loading HiAnime stream...</span>';
  document.getElementById("player-subtitles").innerHTML = "";

  var ep = null;
  for (var i = 0; i < CURRENT_HIANIME_EPS.length; i++) {
    if (CURRENT_HIANIME_EPS[i].number === num) { ep = CURRENT_HIANIME_EPS[i]; break; }
  }
  if (!ep || !ep.id) {
    document.getElementById("player-controls").innerHTML = '<div class="error">Episode not found on HiAnime</div>';
    HI_FAILED = true;
    return;
  }

  consumetGet("/watch?id=" + ep.id + "&_all=1", function(err, data) {
    var controlsEl = document.getElementById("player-controls");
    if (err || !data.sources || !data.sources.length) {
      var miruroUrl = "https://miruro.tv/search?q=" + encodeURIComponent(CURRENT_ANIME_TITLE);
      controlsEl.innerHTML = 'All sources failed. <br><br><a class="ext-link" href="' + miruroUrl + '" target="_blank">Try on Miruro.to</a>';
      HI_FAILED = true;
      return;
    }
    CURRENT_STREAMS = data.sources;
    CURRENT_SUBTITLES = data.tracks || [];

    var first = data.sources[0];
    var firstUrl = first.url;
    var firstRef = first._provider === "AnimeUnity" ? "https://www.animeunity.to" : first._provider === "AnimeSaturn" ? "https://www.animesaturn.cx" : "https://www.animesaturn.cx";
    var proxyUrl = PROXY_BASE + "/proxy?url=" + encodeURIComponent(firstUrl) + "&referer=" + encodeURIComponent(firstRef);

    var controlsHtml = '<div class="c" style="width:auto"><label>Server:</label></div><div class="c" style="width:auto">';
    controlsHtml += '<select id="hi-server-select" onchange="switchHiSource()">';
    for (var si = 0; si < data.sources.length; si++) {
      var si_prov = data.sources[si]._provider || "Provider";
      var si_ql = data.sources[si].quality || "default";
      controlsHtml += '<option value="' + si + '"' + (si === 0 ? " selected" : "") + ">" + si_prov + " (" + si_ql + ")</option>";
    }
    controlsHtml += '</select></div>';

    if (data.tracks && data.tracks.length) {
      controlsHtml += '<div class="c" style="width:auto"><label>Subs:</label></div><div class="c" style="width:auto">';
      controlsHtml += '<select onchange="changeSub(this.value)"><option value="">None</option>';
      for (var j = 0; j < data.tracks.length; j++) {
        controlsHtml += '<option value="' + j + '">' + (data.tracks[j].label || "Track " + (j+1)) + "</option>";
      }
      controlsHtml += '</select></div>';
    }
    controlsEl.innerHTML = controlsHtml;

    streamHiVideo(first);
  });
}

checkAnilistToken();
loadHome();
</script>
