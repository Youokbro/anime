<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>AnimeStream</title>
<style>

*{margin:0;padding:0;box-sizing:border-box}
body{background:#111;color:#eee;font-family:-apple-system,Helvetica,Arial,sans-serif;font-size:14px}
input,button{font-size:16px}
.page{display:none}
.page.active{display:block}
.nav{background:#1a1a1a;padding:8px 12px;display:table;width:100%;border-bottom:1px solid #333}
.nav-cell{display:table-cell;vertical-align:middle}
.nav-title{font-size:18px;font-weight:bold;color:#38bdf8}
.nav-back{color:#38bdf8;font-size:16px;padding:4px 8px;background:none;border:1px solid #38bdf8;border-radius:4px;cursor:pointer}
.search-wrap{padding:10px 12px;background:#1a1a1a;border-bottom:1px solid #333}
.search-row{display:table;width:100%}
.search-row .c{display:table-cell;vertical-align:middle}
.search-row input{width:100%;padding:8px 10px;border:1px solid #444;border-radius:4px;background:#222;color:#eee;outline:none}
.search-row button{padding:8px 14px;margin-left:6px;border:none;border-radius:4px;background:#38bdf8;color:#111;font-weight:bold;cursor:pointer}
.section-title{padding:12px 12px 6px;font-size:16px;font-weight:bold;color:#38bdf8}
.card-table{margin:0 8px 16px}
.card-table table{width:100%;border-collapse:collapse}
.card-table td{width:25%;padding:6px;text-align:center;vertical-align:top}
.poster-card{display:block;background:#1a1a1a;border-radius:4px;overflow:hidden;cursor:pointer}
.poster-card img{width:100%;display:block;min-height:140px;background:#222}
.poster-card .label{padding:6px 4px;font-size:11px;color:#ccc;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.banner{width:100%;position:relative}
.banner img{width:100%;display:block}
.banner-overlay{background:linear-gradient(transparent,#111);padding:12px;position:absolute;bottom:0;left:0;right:0}
.banner-overlay h1{font-size:20px;color:#fff}
.detail-body{padding:12px}
.detail-desc{color:#aaa;font-size:13px;line-height:1.5;margin-bottom:12px}
.episode-table{width:100%;border-collapse:collapse}
.episode-table th{background:#1a1a1a;padding:8px 10px;text-align:left;font-size:12px;color:#888;border-bottom:1px solid #333}
.episode-table td{padding:8px 10px;font-size:13px;border-bottom:1px solid #2a2a2a;cursor:pointer}
.episode-table tr:nth-child(odd) td{background:#1a1a1a}
.episode-table tr:nth-child(even) td{background:#222}
.episode-table tr td:first-child{width:40px;color:#38bdf8;text-align:center}
.episode-table tr:hover td{background:#2a2a2a}
#player-page{position:fixed;top:0;left:0;right:0;bottom:0;z-index:100;background:#000}
#player-page video{width:100%;height:auto;max-height:80vh;display:block;margin:0 auto;background:#000}
.player-top{background:rgba(0,0,0,0.8);padding:8px 12px;display:table;width:100%}
.player-top .c{display:table-cell;vertical-align:middle}
.player-info{font-size:14px;color:#eee;padding-left:10px}
.player-sub{text-align:center;padding:8px}
.player-sub select{padding:4px 8px;background:#222;color:#eee;border:1px solid #444;border-radius:4px}
.loading{text-align:center;padding:30px;color:#666}
.error{text-align:center;padding:30px;color:#f44}
</style> 
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
</head>
<body>

<div id="home-page" class="page active">
  <div class="nav"><div class="nav-cell nav-title">AnimeStream</div></div>
  <div class="search-wrap">
    <div class="search-row">
      <div class="c" style="width:100%"><input id="home-search-input" type="text" placeholder="Search..." onkeydown="if(event.keyCode===13)doHomeSearch()"></div>
      <div class="c" style="width:auto"><button onclick="doHomeSearch()">Go</button></div>
    </div>
  </div>
  <div id="home-sections"></div>
</div>

<div id="search-page" class="page">
  <div class="nav">
    <div class="nav-cell" style="width:auto"><button class="nav-back" onclick="showPage('home')">Back</button></div>
    <div class="nav-cell nav-title" style="padding-left:10px">Search</div>
  </div>
  <div class="search-wrap">
    <div class="search-row">
      <div class="c" style="width:100%"><input id="search-input" type="text" placeholder="Search..." onkeydown="if(event.keyCode===13)doSearch()"></div>
      <div class="c" style="width:auto"><button onclick="doSearch()">Go</button></div>
    </div>
  </div>
  <div id="search-results"></div>
</div>

<div id="detail-page" class="page">
  <div class="nav">
    <div class="nav-cell" style="width:auto"><button class="nav-back" onclick="showPage('home')">Back</button></div>
    <div class="nav-cell nav-title" style="padding-left:10px">Details</div>
  </div>
  <div id="detail-content"></div>
</div>

<div id="player-page" class="page">
  <div class="player-top">
    <div class="c" style="width:auto"><button class="nav-back" onclick="closePlayer()">Back</button></div>
    <div class="c player-info" id="player-info">Episode</div>
  </div>
  <video id="player-video" controls autoplay playsinline></video>
  <div class="player-sub" id="player-subtitles"></div>
</div>

<script>
var API_BASE = "https://miruro-api-navy.vercel.app";
var CURRENT_EPISODES = [];
var CURRENT_STREAMS = [];
var CURRENT_SUBTITLES = [];

function apiGet(path, cb) {
  var x = new XMLHttpRequest();
  x.open("GET", API_BASE + path, true);
  x.onreadystatechange = function() {
    if (x.readyState === 4) {
      if (x.status === 200) { try { cb(null, JSON.parse(x.responseText)); } catch(e) { cb("Parse error"); } }
      else { cb("Error " + x.status); }
    }
  };
  x.send();
}

function showPage(name) {
  var pages = ["home","search","detail","player"];
  for (var i = 0; i < pages.length; i++) document.getElementById(pages[i] + "-page").className = "page";
  document.getElementById(name + "-page").className = "page active";
}

function doHomeSearch() {
  var q = document.getElementById("home-search-input").value.trim();
  if (q.length > 0) { document.getElementById("search-input").value = q; doSearch(); }
}

function getTitle(i) {
  var t = i.title;
  if (typeof t === "string") return t;
  if (t && typeof t === "object") return t.english || t.romaji || t.userPreferred || t.native || "";
  return i.name || "";
}

function getImg(i) {
  var c = i.coverImage;
  if (c && typeof c === "object") return c.large || c.extraLarge || c.medium || "";
  return i.image || i.cover || i.poster || "";
}

function buildSection(title, data) {
  var r = data.results || [];
  if (!r.length) return "";
  var h = '<div class="section-title">' + title + '</div><div class="card-table"><table><tr>';
  for (var i = 0; i < r.length; i++) {
    var id = r[i].id || 0;
    h += '<td><div class="poster-card" onclick="openDetail(' + id + ')">';
    h += '<img src="' + getImg(r[i]) + '" alt="" onerror="this.style.display=\'none\'">';
    h += '<div class="label">' + getTitle(r[i]) + '</div></div></td>';
    if ((i + 1) % 4 === 0 && i < r.length - 1) h += '</tr><tr>';
  }
  return h + '</tr></table></div>';
}

function loadHome() {
  var c = document.getElementById("home-sections");
  c.innerHTML = '<div class="loading">Loading...</div>';
  var secs = [
    { t: "Trending", e: "/trending?per_page=20" },
    { t: "Popular", e: "/popular?per_page=20" },
    { t: "Recent", e: "/recent?per_page=20" }
  ];
  var loaded = 0;
  var html = "";
  for (var i = 0; i < secs.length; i++) {
    (function(idx) {
      apiGet(secs[idx].e, function(err, data) {
        loaded++;
        if (!err) html += buildSection(secs[idx].t, data);
        if (loaded === secs.length) c.innerHTML = html || '<div class="error">Failed to load</div>';
      });
    })(i);
  }
}

function doSearch() {
  var q = document.getElementById("search-input").value.trim();
  if (!q.length) return;
  var c = document.getElementById("search-results");
  c.innerHTML = '<div class="loading">Searching...</div>';
  showPage("search");
  apiGet("/search?query=" + encodeURIComponent(q) + "&per_page=20", function(err, data) {
    if (err) { c.innerHTML = '<div class="error">' + err + '</div>'; return; }
    var r = data.results || [];
    c.innerHTML = r.length ? buildSection("Results", data) : '<div class="error">No results</div>';
  });
}

function openDetail(id) {
  showPage("detail");
  var c = document.getElementById("detail-content");
  c.innerHTML = '<div class="loading">Loading...</div>';
  CURRENT_EPISODES = [];
  apiGet("/info/" + id, function(err, info) {
    if (err) { c.innerHTML = '<div class="error">' + err + '</div>'; return; }
    var img = getImg(info);
    var title = getTitle(info);
    var desc = (info.description || "").replace(/<[^>]*>/g, "");
    var html = '';
    if (img) html += '<div class="banner"><img src="' + img + '" alt=""><div class="banner-overlay"><h1>' + title + '</h1></div></div>';
    else html += '<div class="detail-body"><h1 style="padding:12px;font-size:20px;color:#38bdf8">' + title + '</h1>';
    html += '<div class="detail-body">';
    if (desc) html += '<div class="detail-desc">' + desc + '</div>';
    html += '<div class="section-title">Episodes</div><div id="ep-list"><div class="loading">Loading episodes...</div></div></div>';
    c.innerHTML = html;
    apiGet("/episodes/" + id, function(err2, eps) {
      var el = document.getElementById("ep-list");
      if (err2) { el.innerHTML = '<div class="error">' + err2 + '</div>'; return; }
      var flat = [];
      var provs = eps.providers || {};
      for (var p in provs) {
        if (!provs[p] || !provs[p].episodes) continue;
        var cats = provs[p].episodes;
        var list = null;
        var cat = "sub";
        if (cats.sub && cats.sub.length) { list = cats.sub; }
        else { for (var c2 in cats) { list = cats[c2]; cat = c2; break; } }
        if (list && list.length) {
          for (var k = 0; k < list.length; k++) {
            list[k]._provider = p;
            list[k]._category = cat;
          }
          flat = list;
          break;
        }
      }
      if (!flat.length) { el.innerHTML = '<div class="error">No episodes</div>'; return; }
      CURRENT_EPISODES = flat;
      var tbl = '<table class="episode-table"><tr><th>#</th><th>Title</th><th>Aired</th></tr>';
      for (var i = 0; i < flat.length; i++) {
        var ep = flat[i];
        var num = ep.number || (i + 1);
        var ttl = ep.title || "Episode " + num;
        var aired = ep.airDate || ep.releaseDate || "-";
        var eid = ep.id || "";
        tbl += '<tr onclick="playEpisode(\'' + eid.replace(/'/g,"\\'") + '\',' + num + ')">';
        tbl += '<td>' + num + '</td><td>' + ttl + '</td><td>' + aired + '</td></tr>';
      }
      el.innerHTML = tbl + '</table>';
    });
  });
}

function playEpisode(eid, num) {
  showPage("player");
  var v = document.getElementById("player-video");
  v.pause(); v.src = ""; v.innerHTML = "";
  if (window._hls) { window._hls.destroy(); window._hls = null; }
  document.getElementById("player-info").innerHTML = "Episode " + num;
  document.getElementById("player-subtitles").innerHTML = '<span class="loading">Loading...</span>';
  apiGet("/" + eid, function(err, data) {
    if (err) { document.getElementById("player-subtitles").innerHTML = '<span class="error">' + err + '</span>'; return; }
    var streams = data.streams || [];
    var subs = data.subtitles || [];
    CURRENT_STREAMS = streams;
    CURRENT_SUBTITLES = subs;
    if (!streams.length) { document.getElementById("player-subtitles").innerHTML = '<span class="error">No streams</span>'; return; }
        var url = streams[0].url;
    v.crossOrigin = "anonymous";
    if (url.indexOf(".mp4") > -1 || streams[0].type === "mp4") {
      v.src = url; v.load();
    } else {
      if (v.canPlayType("application/vnd.apple.mpegurl")) {
        v.src = url; v.load();
      } else if (window.Hls && window.Hls.isSupported()) {
        var hls = new window.Hls(); window._hls = hls;
        hls.loadSource(url); hls.attachMedia(v);
      } else {
        document.getElementById("player-subtitles").innerHTML = '<span class="error">HLS not supported</span>';
      }
       var sh = "";
    if (subs.length) {
      sh = 'Subtitles: <select onchange="changeSub(this.value)"><option value="">None</option>';
      for (var j = 0; j < subs.length; j++) sh += '<option value="' + j + '">' + (subs[j].label || "Sub " + (j+1)) + '</option>';
      sh += '</select>';
    }
    document.getElementById("player-subtitles").innerHTML = sh;
  });
}

function changeSub(val) {
  var v = document.getElementById("player-video");
  var t = v.getElementsByTagName("track");
  while (t.length) v.removeChild(t[0]);
  if (val === "") return;
  var s = CURRENT_SUBTITLES[parseInt(val, 10)];
  if (!s || !s.file) return;
  var tr = document.createElement("track");
  tr.kind = "subtitles"; tr.label = s.label || "Subs"; tr.srclang = "en"; tr.src = s.file; tr.default = true;
  v.appendChild(tr);
}

function closePlayer() {
  var v = document.getElementById("player-video");
  v.pause(); v.src = "";
  showPage("home");
}

loadHome();
</script>
</body></html>
