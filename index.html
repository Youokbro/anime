<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>AnimeStream</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%}
body{background:#000;color:#eee;font-family:-apple-system,Helvetica,Arial,sans-serif;font-size:14px;overflow-x:hidden}
input,button{font-size:16px}
.page{display:none}
.page.active{display:block}

.nav{background:#050505;padding:10px 14px;display:table;width:100%;border-bottom:1px solid #222}
.nav-cell{display:table-cell;vertical-align:middle}
.nav-title{font-size:20px;font-weight:bold;color:#38bdf8}
.nav-back{padding:5px 10px;background:none;color:#38bdf8;border:1px solid #38bdf8;border-radius:4px;cursor:pointer;font-size:14px}

.search-wrap{padding:12px 14px;background:#050505}
.search-row{display:table;width:100%}
.search-row .c{display:table-cell;vertical-align:middle}
.search-row input{width:100%;padding:10px 12px;border:1px solid #333;border-radius:4px;background:#111;color:#eee;outline:none}
.search-row input:focus{border-color:#38bdf8}
.search-row button{padding:10px 16px;margin-left:6px;border:none;border-radius:4px;background:#38bdf8;color:#000;font-weight:bold;cursor:pointer}

.section-title{padding:14px 12px 8px;font-size:16px;font-weight:bold;color:#38bdf8}
.card-table{margin:0 6px 14px}
.card-table table{width:100%;border-collapse:collapse}
.card-table td{width:25%;padding:4px;text-align:center;vertical-align:top}
@media (max-width:480px){.card-table td{width:33.33%}}
.poster-card{display:block;background:#0a0a0a;border-radius:4px;overflow:hidden;cursor:pointer;border:1px solid #1a1a1a}
.poster-card img{width:100%;display:block;min-height:140px;background:#111}
.poster-card .label{padding:6px 4px;font-size:11px;color:#ccc;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

.detail-title{font-size:18px;color:#38bdf8;padding:12px 12px 0;margin:0}
.detail-gap{height:12px}
.detail-desc{color:#aaa;font-size:13px;line-height:1.5;margin-bottom:12px}
.detail-cover{width:100%;display:block;border-radius:4px;margin-bottom:10px}

.detail-top{display:table;width:100%}
.detail-left{display:table-cell;width:35%;vertical-align:top;padding:12px}
.detail-right{display:table-cell;width:65%;vertical-align:top;padding:12px 12px 12px 0}

@media (max-width:767px){
.detail-top,.detail-left,.detail-right{display:block;width:auto}
.detail-left{padding:12px 12px 0}
.detail-right{padding:0 12px 12px}
}

@media (min-width:768px) and (max-width:1023px){
.detail-left{width:30%}
.detail-right{width:70%}
#player-page video{max-width:720px}
}

@media (min-width:1024px){
.detail-cover{max-width:300px}
.detail-left{width:30%}
.detail-right{width:70%}
}

.episode-table{width:100%;border-collapse:collapse}
.episode-table th{background:#0a0a0a;padding:8px 10px;text-align:left;font-size:12px;color:#888;border-bottom:1px solid #1a1a1a}
.episode-table td{padding:8px 10px;font-size:13px;border-bottom:1px solid #1a1a1a;cursor:pointer}
.episode-table tr:nth-child(odd) td{background:#0a0a0a}
.episode-table tr:nth-child(even) td{background:#050505}
.episode-table tr td:first-child{width:40px;color:#38bdf8;text-align:center}

.season-row{text-align:center;padding:8px 4px}
.season-btn{display:inline-block;padding:5px 12px;margin:3px;border:1px solid #444;border-radius:4px;background:#0a0a0a;color:#aaa;cursor:pointer;font-size:11px}
.season-btn.active{background:#38bdf8;color:#000;border-color:#38bdf8;font-weight:bold}

#player-page{position:fixed;top:0;left:0;right:0;bottom:0;z-index:100;background:#000}
#player-page video{width:100%;max-width:960px;display:block;margin:0 auto;background:#000}
video::-webkit-media-controls-toggle-closed-captions-button{display:none!important}
video::-webkit-media-controls-closed-captions-button{display:none!important}
.player-top{background:#050505;padding:8px 12px;display:table;width:100%}
.player-top .c{display:table-cell;vertical-align:middle}
.player-info{font-size:13px;color:#eee;padding-left:10px}
.player-controls{text-align:center;padding:6px 8px;display:table;width:100%;background:#050505}
.player-controls .c{display:table-cell;vertical-align:middle;padding:0 4px}
.player-controls select{padding:4px 8px;background:#111;color:#eee;border:1px solid #333;border-radius:4px;font-size:13px}
.player-controls label{color:#aaa;font-size:12px}
.player-sub{text-align:center;padding:6px}
.player-sub select{padding:4px 8px;background:#111;color:#eee;border:1px solid #333;border-radius:4px;font-size:13px}
.ext-link{display:inline-block;padding:10px 20px;background:#38bdf8;color:#000;border-radius:4px;font-weight:bold;text-decoration:none;margin-top:10px}

@keyframes pulse{0%,100%{opacity:.4}50%{opacity:1}}
.loading{text-align:center;padding:30px;color:#666;animation:pulse 1.5s ease-in-out infinite}
.error{text-align:center;padding:30px;color:#f44;font-size:13px}

.btn-status{display:inline-block;padding:4px 10px;margin:2px;border:1px solid #333;border-radius:4px;background:#0a0a0a;color:#eee;cursor:pointer;font-size:12px;text-decoration:none}
.btn-status.active{background:#38bdf8;color:#000;border-color:#38bdf8;font-weight:bold}
.login-btn{display:inline-block;padding:4px 12px;background:#38bdf8;color:#000;border:none;border-radius:4px;cursor:pointer;font-weight:bold;font-size:12px;text-decoration:none}
.avatar-img{width:30px;height:30px;border-radius:50%;vertical-align:middle;border:2px solid #38bdf8}
.nav-right{text-align:right}
.logout-link{color:#888;font-size:11px;margin-left:6px;cursor:pointer;text-decoration:underline}
</style> 
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
</head>
<body>

<div id="home-page" class="page active">
  <div class="nav" style="display:table;width:100%"><div class="nav-cell nav-title">AnimeStream</div><div class="nav-cell nav-right" id="anilist-nav"></div></div>
  <div class="search-wrap">
    <div class="search-row">
      <div class="c" style="width:100%"><input id="home-search-input" type="text" placeholder="Search..." onkeydown="if(event.keyCode===13)doHomeSearch()"></div>
      <div class="c" style="width:auto"><button onclick="doHomeSearch()">Go</button></div>
    </div>
  </div>
  <div id="home-sections"><div id="anilist-sections"></div><div id="catalog-sections"></div></div>
</div>

<div id="search-page" class="page">
  <div class="nav">
    <div class="nav-cell" style="width:auto"><button class="nav-back" onclick="showPage('home')">Back</button></div>
    <div class="nav-cell nav-title" style="padding-left:10px">Search</div>
  </div>
  <div class="search-wrap">
    <div class="search-row">
      <div class="c" style="width:100%"><input id="search-input" type="text" placeholder="Search..." onkeydown="if(event.keyCode===13)doSearch()"></div>
      <div class="c" style="width:auto"><button onclick="doSearch()">Go</button></div>
    </div>
  </div>
  <div id="search-results"></div>
</div>

<div id="detail-page" class="page">
  <div class="nav">
    <div class="nav-cell" style="width:auto"><button class="nav-back" onclick="showPage('home')">Back</button></div>
    <div class="nav-cell nav-title" style="padding-left:10px">Details</div>
  </div>
  <div id="detail-content"></div>
</div>

<div id="player-page" class="page">
  <div class="player-top">
    <div class="c" style="width:auto"><button class="nav-back" onclick="closePlayer()">Back</button></div>
    <div class="c player-info" id="player-info">Episode</div>
  </div>
  <video id="player-video" controls autoplay playsinline></video>
  <div id="player-controls" class="player-controls"></div>
  <div class="player-sub" id="player-subtitles"></div>
</div>

<script>
var CURRENT_STREAMS = [];
var CURRENT_SUBTITLES = [];
var _failTimeout = null;
var _episodeCache = {};
var _currentSubIdx = -1;
var TMDB_KEY = "0ff3dcace998b2fa393607f0af17a6a5";
var OPENSUBTITLES_KEY = "KkRrsjYvWKEsREXgDETE8aBP4WktuXbH";
var MIRURO_API = "https://miruro-api-navy.vercel.app";
var PROXY_BASE = "https://anim-proxy.ahaantadi.workers.dev/";
var CURRENT_ANIME_ID = 0;
var CURRENT_ANIME_ANILIST_ID = 0;
var CURRENT_ANIME_TITLE = "";
var CURRENT_ANIME_ROMAJI = "";
var CURRENT_TMDB_ID = "";
var CURRENT_IMDB_ID = "";
var CURRENT_SEASON = 1;
var CURRENT_EP_NUM = 0;
var _lastPage = "home";
var _homeCardData = [];
var _homeResults = [];
var _lastAnilistSearch = [];
var _episodeList = [];

var ANILIST_CLIENT_ID = "43388";
var ANILIST_TOKEN = localStorage.getItem("anilist_token") || "";
var ANILIST_USER = null;

function checkAnilistToken() {
  var h = window.location.hash;
  if (h.indexOf("access_token=") > -1) {
    var m = h.match(/access_token=([^&]+)/);
    if (m) {
      ANILIST_TOKEN = m[1];
      localStorage.setItem("anilist_token", ANILIST_TOKEN);
      history.replaceState(null, "", window.location.pathname + window.location.search);
    }
  }
  anilistRefresh();
}

function anilistPasteToken() {
  var inp = document.getElementById("token-input");
  if (!inp || !inp.value.trim()) return;
  ANILIST_TOKEN = inp.value.trim();
  localStorage.setItem("anilist_token", ANILIST_TOKEN);
  anilistRefresh();
}

function anilistLogin() {
  var redirect = encodeURIComponent(window.location.origin + window.location.pathname.replace(/\/$/, ""));
  window.location.href = "https://anilist.co/api/v2/oauth/authorize?client_id=" + ANILIST_CLIENT_ID + "&redirect_uri=" + redirect + "&response_type=token";
}

function anilistLogout() {
  ANILIST_TOKEN = ""; ANILIST_USER = null;
  localStorage.removeItem("anilist_token");
  location.reload();
}

function anilistGraphQL(query, vars, cb) {
  var x = new XMLHttpRequest();
  x.open("POST", "https://graphql.anilist.co", true);
  x.setRequestHeader("Content-Type", "application/json");
  x.setRequestHeader("Accept", "application/json");
  if (ANILIST_TOKEN) x.setRequestHeader("Authorization", "Bearer " + ANILIST_TOKEN);
  x.onreadystatechange = function() {
    if (x.readyState === 4) {
      if (x.status === 200) { try { cb(null, JSON.parse(x.responseText).data); } catch(e) { cb("Parse error"); } }
      else { cb(x.status); }
    }
  };
  x.send(JSON.stringify({ query: query, variables: vars || {} }));
}

function anilistRefresh() {
  var nav = document.getElementById("anilist-nav");
  if (!nav) return;
  if (!ANILIST_TOKEN) {
    nav.innerHTML = '<a class="login-btn" href="https://anilist.co/api/v2/oauth/authorize?client_id=43388&redirect_uri=https%3A%2F%2Fyouokbro.github.io%2Fanime&response_type=token">Login</a> <input id="token-input" type="text" placeholder="Paste token" style="width:70px;padding:3px 5px;background:#111;border:1px solid #333;border-radius:3px;color:#eee;font-size:10px;vertical-align:middle"> <button onclick="anilistPasteToken()" style="padding:3px 6px;background:#38bdf8;color:#000;border:none;border-radius:3px;cursor:pointer;font-size:10px">Set</button>';
    return;
  }
  nav.innerHTML = '<span class="loading" style="font-size:11px;color:#888">Loading...</span>';
  anilistGraphQL("query { Viewer { id name avatar { large } } }", {}, function(err, data) {
    if (err || !data || !data.Viewer) {
      if (err === 401) {
        ANILIST_TOKEN = ""; localStorage.removeItem("anilist_token");
        nav.innerHTML = '<a class="login-btn" href="https://anilist.co/api/v2/oauth/authorize?client_id=43388&redirect_uri=https%3A%2F%2Fyouokbro.github.io%2Fanime&response_type=token">Login</a> <input id="token-input" type="text" placeholder="Paste token" style="width:70px;padding:3px 5px;background:#111;border:1px solid #333;border-radius:3px;color:#eee;font-size:10px;vertical-align:middle"> <button onclick="anilistPasteToken()" style="padding:3px 6px;background:#38bdf8;color:#000;border:none;border-radius:3px;cursor:pointer;font-size:10px">Set</button>';
      } else {
        nav.innerHTML = '<span style="font-size:11px;color:#888">Retry...</span>';
        setTimeout(function() { anilistRefresh(); }, 3000);
      }
      return;
    }
    ANILIST_USER = data.Viewer;
    var a = data.Viewer.avatar;
    var img = (a && a.large) ? '<img class="avatar-img" src="' + a.large + '" alt=""> ' : "";
    nav.innerHTML = img + '<span style="font-size:12px;color:#eee">' + data.Viewer.name + '</span> <span class="logout-link" onclick="anilistLogout()">(logout)</span>';
    loadAnilistSections();
  });
}

function loadAnilistSections() {
  var sec = document.getElementById("anilist-sections");
  if (!sec) return;
  anilistGraphQL("query ($u: Int) { MediaListCollection(userId: $u, type: ANIME) { lists { name entries { id progress media { id title { romaji english } coverImage { extraLarge } episodes } } } } }", { u: ANILIST_USER.id }, function(err, data) {
    if (err || !data || !data.MediaListCollection) return;
    var lists = data.MediaListCollection.lists || [];
    var html = "";
    for (var i = 0; i < lists.length; i++) {
      var list = lists[i];
      var name = list.name || "";
      var entries = list.entries || [];
      if (!entries.length) continue;
      var label = "";
      if (name === "CURRENT") label = "Continue Watching";
      else if (name === "PLANNING") label = "My List";
      else continue;
      html += '<div class="section-title">' + label + '</div><div class="card-table"><table><tr>';
      for (var j = 0; j < entries.length && j < 20; j++) {
        var e = entries[j];
        var m = e.media || {};
        var img = (m.coverImage && (m.coverImage.extraLarge || m.coverImage.large)) || "";
        var t = m.title ? (m.title.english || m.title.romaji || "") : "";
        var ep = m.episodes || "?";
        var prog = e.progress || 0;
        var cardIdx = _homeCardData.length;
        _homeCardData.push({ id: m.id, title: t, anilistId: m.id });
        html += '<td><div class="poster-card" onclick="openHomeCard(' + cardIdx + ')">';
        if (img) html += '<img src="' + img + '" alt="" onerror="this.style.display=\"none\"">';
        else html += '<div style="height:140px;background:#111"></div>';
        html += '<div class="label">' + t + '</div>';
        if (name === "CURRENT") html += '<div style="font-size:10px;color:#38bdf8">Ep ' + prog + '/' + ep + '</div>';
        html += '</div></td>';
        if ((j + 1) % 4 === 0 && j < entries.length - 1) html += '</tr><tr>';
      }
      html += '</tr></table></div>';
    }
    if (html) sec.innerHTML = html;
  });
}

function loadAnilistStatus(mediaId) {
  var el = document.getElementById("anilist-status");
  if (!el || !ANILIST_TOKEN) return;
  anilistGraphQL("query ($id: Int, $u: Int) { Media(id: $id) { mediaListEntry { id status progress } } }", { id: parseInt(mediaId, 10), u: ANILIST_USER ? ANILIST_USER.id : 0 }, function(err, data) {
    if (err || !data || !data.Media) return;
    var entry = data.Media.mediaListEntry;
    var cur = entry ? entry.status : "";
    var prog = entry ? (entry.progress || 0) : 0;
    var statuses = ["CURRENT", "PLANNING", "COMPLETED", "DROPPED", "PAUSED"];
    var labels = ["Watching", "Planning", "Completed", "Dropped", "Paused"];
    var html = '<div class="section-title" style="margin-top:8px">AniList Status</div><div class="status-row">';
    for (var i = 0; i < statuses.length; i++) {
      var active = statuses[i] === cur ? ' active' : '';
      html += '<a class="btn-status' + active + '" href="#" onclick="saveAnilistStatus(' + mediaId + ',\'' + statuses[i] + '\');return false;">' + labels[i] + '</a> ';
    }
    if (entry) html += '<span style="font-size:11px;color:#888;margin-left:8px">Progress: ' + prog + '</span>';
    html += '</div>';
    el.innerHTML = html;
  });
}

function saveAnilistStatus(mediaId, status) {
  anilistGraphQL("mutation ($m: Int, $s: MediaListStatus) { SaveMediaListEntry(mediaId: $m, status: $s) { id status progress } }", { m: parseInt(mediaId, 10), s: status }, function(err, data) {
    if (err) { alert("Failed to update AniList"); return; }
    loadAnilistStatus(mediaId);
    loadAnilistSections();
  });
}

function saveAnilistProgress(mediaId, episode) {
  if (!ANILIST_TOKEN || !ANILIST_USER) return;
  anilistGraphQL("query ($id: Int, $u: Int) { Media(id: $id) { mediaListEntry { id status progress } } }", { id: parseInt(mediaId, 10), u: ANILIST_USER.id }, function(err, data) {
    if (err || !data || !data.Media) return;
    var entry = data.Media.mediaListEntry;
    var curProg = entry ? (entry.progress || 0) : 0;
    if (episode > curProg) {
      anilistGraphQL("mutation ($m: Int, $s: MediaListStatus, $p: Int) { SaveMediaListEntry(mediaId: $m, status: $s, progress: $p) { id status progress } }", { m: parseInt(mediaId, 10), s: "CURRENT", p: episode }, function(err2, data2) {
        if (!err2) { loadAnilistSections(); loadAnilistStatus(mediaId); }
      });
    }
  });
}


function showPage(name) {
  var pages = ["home","search","detail","player"];
  for (var i = 0; i < pages.length; i++) document.getElementById(pages[i] + "-page").className = "page";
  document.getElementById(name + "-page").className = "page active";
  document.body.style.overflow = (name === "player") ? "hidden" : "";
}

function doHomeSearch() {
  var q = document.getElementById("home-search-input").value.trim();
  if (q.length > 0) { document.getElementById("search-input").value = q; doSearch(); }
}

function getTitle(i) {
  var t = i.title;
  if (typeof t === "string") return t;
  if (t && typeof t === "object") return t.english || t.romaji || t.userPreferred || t.native || "";
  return i.name || "";
}

function getImg(i) {
  var c = i.coverImage;
  if (c && typeof c === "object") return c.extraLarge || c.large || c.medium || "";
  return i.image || i.cover || i.poster || "";
}

var _homeCardData = [];

function buildSection(title, data) {
  var r = data.results || [];
  if (!r.length) return "";
  var h = '<div class="section-title">' + title + '</div><div class="card-table"><table><tr>';
  for (var i = 0; i < r.length; i++) {
    var idx = _homeCardData.length;
    _homeCardData.push({ id: r[i].id, title: getTitle(r[i]) });
    h += '<td><div class="poster-card" onclick="openHomeCard(' + idx + ')">';
    h += '<img src="' + getImg(r[i]) + '" alt="" onerror="this.style.display=\'none\'">';
    h += '<div class="label">' + getTitle(r[i]) + '</div></div></td>';
    if ((i + 1) % 4 === 0 && i < r.length - 1) h += '</tr><tr>';
  }
  return h + '</tr></table></div>';
}

function loadHome() {
  var c = document.getElementById("catalog-sections");
  c.innerHTML = '<div class="loading">Loading...</div>';
  _homeResults = [];
  var queries = [
    { t: "Popular", q: "{ Page(page: 1, perPage: 20) { media(sort: POPULARITY_DESC, type: ANIME) { id averageScore idMal title { romaji english } coverImage { extraLarge } description } } }" }
  ];
  var loaded = 0;
  var total = 3; // AniList + MAL + Kitsu
  function checkDone() {
    loaded++;
    if (loaded >= total && html) c.innerHTML = html;
    else if (loaded >= total) c.innerHTML = html || '<div class="error">Failed to load catalogs</div>';
  }
  var html = "";
  for (var i = 0; i < queries.length; i++) {
    (function(idx) {
      anilistGraphQL(queries[idx].q, {}, function(err, data) {
        loaded++;
        if (!err && data && data.Page && data.Page.media) {
          var items = data.Page.media;
          var h = '<div class="section-title">' + queries[idx].t + '</div><div class="card-table"><table><tr>';
          for (var j = 0; j < items.length; j++) {
            var m = items[j];
            var img = m.coverImage ? (m.coverImage.extraLarge || m.coverImage.large || "") : "";
            var t = getTitle(m);
            h += '<td><div class="poster-card" onclick="openHomeResult(' + _homeResults.length + ')">';
            if (img) h += '<img src="' + img + '" alt="" onerror="this.style.display=\'none\'">';
            else h += '<div style="height:140px;background:#111"></div>';
            h += '<div class="label">' + t + '</div></div></td>';
            if ((j + 1) % 4 === 0 && j < items.length - 1) h += '</tr><tr>';
            _homeResults.push(m);
          }
          html += h + '</tr></table></div>';
        }
        if (loaded === queries.length) { checkDone(); }
      });
    })(i);
  }
  // MAL Top Anime
  (function() {
    var x = new XMLHttpRequest();
    x.open("GET", "https://api.jikan.moe/v4/top/anime?limit=20", true);
    x.onreadystatechange = function() {
      if (x.readyState !== 4) return;
      if (x.status === 200) {
        try {
          var d = JSON.parse(x.responseText).data || [];
          var h = '<div class="section-title">Top Anime (MAL)</div><div class="card-table"><table><tr>';
          for (var j = 0; j < d.length; j++) {
            var img = d[j].images && d[j].images.jpg && (d[j].images.jpg.large_image_url || d[j].images.jpg.image_url) || "";
            var t = d[j].title || "";
            h += '<td><div class="poster-card" onclick="openExternalResult(\'' + t.replace(/'/g, "\\'") + '\')">';
            if (img) h += '<img src="' + img + '" alt="" onerror="this.style.display=\'none\'">';
            else h += '<div style="height:140px;background:#111"></div>';
            h += '<div class="label">' + t + '</div></div></td>';
            if ((j + 1) % 4 === 0 && j < d.length - 1) h += '</tr><tr>';
          }
          html += h + '</tr></table></div>';
        } catch(e) {}
      }
      checkDone();
    };
    x.send();
  })();
  // Kitsu Trending
  (function() {
    var x = new XMLHttpRequest();
    x.open("GET", "https://kitsu.io/api/edge/trending/anime", true);
    x.setRequestHeader("Accept", "application/vnd.api+json");
    x.onreadystatechange = function() {
      if (x.readyState !== 4) return;
      if (x.status === 200) {
        try {
          var d = JSON.parse(x.responseText).data || [];
          var h = '<div class="section-title">Trending (Kitsu)</div><div class="card-table"><table><tr>';
          for (var j = 0; j < d.length; j++) {
            var attrs = d[j].attributes || {};

            var t = attrs.canonicalTitle || attrs.titles && (attrs.titles.en || attrs.titles.en_jp) || "";
            h += '<td><div class="poster-card" onclick="openExternalResult(\'' + t.replace(/'/g, "\\'") + '\')">';

          }

        } catch(e) {}
      }
      checkDone();
    };
    x.send();
  })();
}

function loadTmdbSeasons(tmdbId) {

var CURRENT_EPISODE_LIST = [];

var _skipTimes = null;
var _skipInterval = null;
var _autoSkip = true;

function fetchSkipTimes(anilistId, episodeNum) {
  _skipTimes = null;
  if (_skipInterval) { clearInterval(_skipInterval); _skipInterval = null; }
  var sb = document.getElementById("skip-btn");
  if (sb) { sb.parentNode.removeChild(sb); }
  // Set estimated fallback and activate detection immediately
  setEstimatedSkipTimes(episodeNum);
  if (_skipTimes.op || _skipTimes.ed) setupSkipDetection();
  if (!anilistId) return;
  var x = new XMLHttpRequest();
  x.open("GET", "https://api.aniskip.com/v2/skip-times/" + anilistId + "/" + episodeNum + "?types=op&types=ed&episodeLength=0", true);
  x.onload = function() {
    if (x.status === 200) {
      try {
        var d = JSON.parse(x.responseText);
        if (d.found && d.results && d.results.length) {
          _skipTimes = {};
          for (var i = 0; i < d.results.length; i++) {
            var r = d.results[i];
            if (r.skipType === "op") _skipTimes.op = r.interval;
            else if (r.skipType === "ed") _skipTimes.ed = r.interval;
          }
          if (_skipTimes.op || _skipTimes.ed) { setupSkipDetection(); }
        }
      } catch (e) {}
    }
  };
  x.onerror = function() {};
  x.send();
}

function setEstimatedSkipTimes(episodeNum) {
  _skipTimes = { op: { startTime: 0, endTime: 88 } };
  // Try to get episode runtime from TMDB for outro skip
  if (CURRENT_EPISODE_LIST && CURRENT_EPISODE_LIST.length) {
    for (var ei = 0; ei < CURRENT_EPISODE_LIST.length; ei++) {
      if (CURRENT_EPISODE_LIST[ei].episode_number === episodeNum) {
        var epData = CURRENT_EPISODE_LIST[ei];
        if (epData.runtime) {
          var totalSec = epData.runtime * 60;
          if (totalSec > 180) {
            _skipTimes.ed = { startTime: totalSec - 90, endTime: totalSec };
          }
        }
        break;
      }
    }
  }
}

function setupSkipDetection() {
  if (_skipInterval) clearInterval(_skipInterval);
  _skipInterval = setInterval(function() {
    var v = document.getElementById("player-video");
    if (!v || !v.src) return;
    var t = v.currentTime;
    var skipContainer = document.getElementById("player-subtitles");
    var sb = document.getElementById("skip-btn");
    var skipType = null;
    if (_skipTimes.op && t >= _skipTimes.op.startTime && t < _skipTimes.op.endTime) skipType = "op";
    else if (_skipTimes.ed && t >= _skipTimes.ed.startTime && t < _skipTimes.ed.endTime) skipType = "ed";

    if (_autoSkip && skipType && _skipTimes[skipType]) {
      v.currentTime = _skipTimes[skipType].endTime;
      return;
    }

    if (skipType) {
      if (!sb) {
        var div = document.createElement("div");
        div.id = "skip-btn";
        div.style.cssText = "text-align:center;padding:6px";
        var label = skipType === "op" ? "Skip Intro" : "Skip Outro";
        div.innerHTML = '<button onclick="doSkip()" style="padding:8px 18px;background:#38bdf8;color:#000;border:none;border-radius:4px;font-weight:bold;font-size:14px;cursor:pointer">' + label + '</button>';
        skipContainer.appendChild(div);
      }
    } else {
      if (sb) sb.parentNode.removeChild(sb);
    }
  }, 500);
}

function doSkip() {
  var v = document.getElementById("player-video");
  if (!v || !_skipTimes) return;
  var t = v.currentTime;
  if (_skipTimes.op && t >= _skipTimes.op.startTime && t < _skipTimes.op.endTime) {
    v.currentTime = _skipTimes.op.endTime;
  } else if (_skipTimes.ed && t >= _skipTimes.ed.startTime && t < _skipTimes.ed.endTime) {
    v.currentTime = _skipTimes.ed.endTime;
  }
  var sb = document.getElementById("skip-btn");
  if (sb) sb.parentNode.removeChild(sb);
}

function prevEpisode() {
  if (CURRENT_EP_NUM > 1) playFromDetail(CURRENT_EP_NUM - 1);
}

function nextEpisode() {
  playFromDetail(CURRENT_EP_NUM + 1);
}

function playFromDetail(num) {
  CURRENT_EP_NUM = num;
  saveAnilistProgress(CURRENT_ANIME_ANILIST_ID, num);
  fetchSkipTimes(CURRENT_ANIME_ANILIST_ID, num);
  document.getElementById("player-video").style.display = "block";
  showPage("player");
  var v = document.getElementById("player-video");
  v.pause(); v.src = ""; v.innerHTML = "";
  if (window._hls) { window._hls.destroy(); window._hls = null; }
  if (_failTimeout) { clearTimeout(_failTimeout); _failTimeout = null; }
  document.getElementById("player-info").innerHTML = CURRENT_ANIME_TITLE + " - Ep " + num;
  document.getElementById("player-controls").innerHTML = '<span class="loading">Checking all sources...</span>';
  document.getElementById("player-subtitles").innerHTML = "";

  var allSources = [];
  var allTracks = [];
  var _rendered = false;
  var _pending = 0;
  _currentSubIdx = -1;

  function parseQuality(q) {
    if (!q) return 720;
    var m = q.match(/(\d+)/);
    if (m) return parseInt(m[1], 10);
    if (q === "HD" || q === "Auto" || q === "?") return 720;
    return 0;
  }

  function addSource(src) {
    if (parseQuality(src.quality) < 720) return;
    for (var c = 0; c < allSources.length; c++) { if (allSources[c].url === src.url) return; }
    allSources.push(src);
    allSources.sort(function(a, b) { return (parseQuality(b.quality) - parseQuality(a.quality)) || ((a._provider || "").localeCompare(b._provider || "")); });
    CURRENT_STREAMS = allSources;
    if (!_rendered) {
      _rendered = true;
      doRender();
    } else {
      updateServerDropdown();
    }
  }

  function addTracks(tracks) {
    if (!tracks) return;
    for (var t = 0; t < tracks.length; t++) { allTracks.push(tracks[t]); }
  }

  function updatePendingIndicator() {
    var ci = document.getElementById("checking-indicator");
    if (_pending > 0) {
      if (!ci) {
        var pc = document.getElementById("player-controls");
        if (pc) {
          var cs = pc.getElementsByTagName("div");
          var lastc = cs.length > 0 ? cs[cs.length - 1] : null;
          if (lastc) {
            var ciDiv = document.createElement("div");
            ciDiv.id = "checking-indicator";
            ciDiv.className = "c";
            ciDiv.style.cssText = "width:auto";
            ciDiv.innerHTML = '<span style="color:#888;font-size:11px">+' + _pending + '...</span>';
            lastc.parentNode.insertBefore(ciDiv, lastc.nextSibling);
          }
        }
      } else {
        ci.innerHTML = '<span style="color:#888;font-size:11px">+' + _pending + '...</span>';
      }
    } else if (ci) {
      ci.parentNode.removeChild(ci);
    }
  }

  function oneDone() {
    _pending--;
    updatePendingIndicator();
    if (!_rendered && _pending <= 0) {
      if (allSources.length) {
        _rendered = true;
        doRender();
      } else {
        document.getElementById("player-controls").innerHTML = '<div class="error">All sources failed</div>';
      }
    }
  }

  // --- fallback: if no requests fired, show error ---
  var _noRequests = true;

  // --- EzVidApi sources (TMDB-based) ---
  if (CURRENT_TMDB_ID) {
    _noRequests = false;
    var EZ_PROVIDERS = ["vidlink", "vidnest", "vidrock"];
    for (var ezi = 0; ezi < EZ_PROVIDERS.length; ezi++) {
      _pending++;
      (function(tmdbEp, ezProv) {
        var ezxhr = new XMLHttpRequest();
        ezxhr.open("GET", "https://api.ezvidapi.com/tv/" + ezProv + "/" + CURRENT_TMDB_ID + "?season=" + CURRENT_SEASON + "&episode=" + tmdbEp);
        ezxhr.onload = function() {
          if (ezxhr.status === 200) {
            try {
              var ezdata = JSON.parse(ezxhr.responseText);
              if (ezdata.stream_url) {
                addSource({ url: ezdata.stream_url, type: "hls", quality: "HD", _provider: "Ez" + ezProv.charAt(0).toUpperCase() + ezProv.slice(1) });
                if (ezdata.subtitles) addTracks(ezdata.subtitles);
              }
            } catch (e) {}
          }
          oneDone();
        };
        ezxhr.onerror = function() { oneDone(); };
        ezxhr.send();
      })(num, EZ_PROVIDERS[ezi]);
    }
  }

  // --- Miruro-API providers (with episode cache) ---
  if (CURRENT_ANIME_ANILIST_ID) {
    _noRequests = false;
    _pending++;
    (function(epNum) {
      function processEpData(epData) {
        try {
          var provNames = ["kiwi", "ally", "bonk", "moo", "bee"];
          for (var pi = 0; pi < provNames.length; pi++) {
            (function(provName) {
              var prov = epData.providers && epData.providers[provName];
              if (!prov) return;
              var subEps = (prov.episodes && prov.episodes.sub) || [];
              var found = null;
              for (var e = 0; e < subEps.length; e++) {
                if (subEps[e].number === epNum) { found = subEps[e]; break; }
              }
              if (!found) return;
              _pending++;
              var bxhr = new XMLHttpRequest();
              bxhr.open("GET", MIRURO_API + "/" + found.id, true);
              bxhr.onload = function() {
                if (bxhr.status === 200) {
                  try {
                    var bData = JSON.parse(bxhr.responseText);
                    var streams = bData.streams || [];
                    for (var s = 0; s < streams.length; s++) {
                      var st = streams[s];
                      var url = st.url;
                      var stype = (st.type || "").toLowerCase();
                      if (stype === "embed") continue;
                      if (url.indexOf(".m3u8") === -1 && url.indexOf(".mp4") === -1 && stype !== "hls" && stype !== "mp4") continue;
                      var proxied = PROXY_BASE + "?url=" + encodeURIComponent(url) + "&referer=" + encodeURIComponent("https://www.miruro.tv/");
                      addSource({
                        url: proxied,
                        type: stype === "mp4" || url.indexOf(".mp4") > -1 ? "mp4" : "hls",
                        quality: st.quality || "HD",
                        _provider: provName.charAt(0).toUpperCase() + provName.slice(1)
                      });
                    }
                    if (bData.subtitles) addTracks(bData.subtitles);
                  } catch (e) {}
                }
                oneDone();
              };
              bxhr.onerror = function() { oneDone(); };
              bxhr.send();
            })(provNames[pi]);
          }
          } catch (e) {}
        oneDone();
      }
      var cached = _episodeCache[CURRENT_ANIME_ANILIST_ID];
      if (cached) {
        processEpData(cached);
      } else {
        var mxhr = new XMLHttpRequest();
        mxhr.open("GET", MIRURO_API + "/episodes/" + CURRENT_ANIME_ANILIST_ID, true);
        mxhr.onload = function() {
          if (mxhr.status === 200) {
            try {
              var epData = JSON.parse(mxhr.responseText);
              _episodeCache[CURRENT_ANIME_ANILIST_ID] = epData;
              processEpData(epData);
            } catch (e) { oneDone(); }
          } else { oneDone(); }
        };
        mxhr.onerror = function() { oneDone(); };
        mxhr.send();
      }
    })(num);
  }

  // --- OpenSubtitles fallback subs (always try, no TMDB required) ---
  if (OPENSUBTITLES_KEY) {
    _pending++;
    (function(epNum, season) {
      var osUrl = "https://api.opensubtitles.com/api/v1/subtitles?languages=en&order_by=download_count&order_direction=desc&season_number=" + season + "&episode_number=" + epNum;
      if (CURRENT_TMDB_ID) {
        osUrl += "&tmdb_id=" + CURRENT_TMDB_ID;
      } else if (CURRENT_IMDB_ID) {
        osUrl += "&parent_imdb_id=" + CURRENT_IMDB_ID.replace(/^tt/i, "");
      } else {
        osUrl += "&query=" + encodeURIComponent(CURRENT_ANIME_TITLE);
      }
      var osx = new XMLHttpRequest();
      osx.open("GET", osUrl, true);
      osx.setRequestHeader("Api-Key", OPENSUBTITLES_KEY);
      osx.setRequestHeader("User-Agent", "AnimeStream v1.0");
      osx.onload = function() {
        if (osx.status === 200) {
          try {
            var osd = JSON.parse(osx.responseText);
            var list = osd.data || [];
            if (list.length) {
              var best = list[0];
              for (var oi = 0; oi < list.length; oi++) {
                var a = list[oi].attributes || {};
                if (a.subtitle_format === "vtt") { best = list[oi]; break; }
              }
              var attrs = best.attributes || {};
              var files = attrs.files || [];
              var fileId = files.length ? (files[0].file_id || 0) : 0;
              if (fileId) {
                _pending++;
                var dlx = new XMLHttpRequest();
                dlx.open("POST", "https://api.opensubtitles.com/api/v1/download", true);
                dlx.setRequestHeader("Content-Type", "application/json");
                dlx.setRequestHeader("Api-Key", OPENSUBTITLES_KEY);
                dlx.setRequestHeader("User-Agent", "AnimeStream v1.0");
                dlx.onload = function() {
                  if (dlx.status === 200) {
                    try {
                      var dl = JSON.parse(dlx.responseText);
                      if (dl.link) {
                        allTracks.push({ file: dl.link, label: "English (OpenSubtitles)" });
                        updateSubsDropdown();
                      }
                    } catch(e) {}
                  }
                  oneDone();
                };
                dlx.onerror = function() { oneDone(); };
                dlx.send(JSON.stringify({ file_id: fileId }));
                oneDone(); return;
              }
            }
          } catch(e) {}
        }
        oneDone();
      };
      osx.onerror = function() { oneDone(); };
      osx.send();
    })(num, CURRENT_SEASON);
  }

  if (_noRequests) {
    document.getElementById("player-controls").innerHTML = '<div class="error">No TMDB or AniList ID available</div>';
    return;
  }

  function buildQualityOptions() {
    var seen = {};
    var html = '';
    for (var qi = 0; qi < allSources.length; qi++) {
      var q = allSources[qi].quality || "HD";
      if (!seen[q]) {
        seen[q] = true;
        var sel = qi === 0 ? ' selected' : '';
        html += '<option value="' + qi + '"' + sel + '>' + q + '</option>';
      }
    }
    return html;
  }

  function doRender() {
    CURRENT_STREAMS = allSources;
    CURRENT_SUBTITLES = allTracks;

    var controlsHtml = '';
    controlsHtml += '<div class="c" style="width:auto"><label>Quality:</label></div><div class="c" style="width:auto">';
    controlsHtml += '<select id="quality-select" onchange="changeQuality()">' + buildQualityOptions() + '</select></div>';
    controlsHtml += '<div class="c" style="width:auto"><label>Server:</label></div><div class="c" style="width:auto">';
    controlsHtml += '<select id="server-select" onchange="switchStream(this.value)">';
    for (var si = 0; si < allSources.length; si++) {
      var sprov = allSources[si]._provider || "Source";
      var sq = allSources[si].quality || "";
      controlsHtml += '<option value="' + si + '"' + (si === 0 ? " selected" : "") + '>' + sprov + (sq ? " (" + sq + ")" : "") + '</option>';
    }
    controlsHtml += '</select></div>';
    if (allTracks.length) {
      controlsHtml += '<div class="c" style="width:auto"><label>Subs:</label></div><div class="c" style="width:auto">';
      controlsHtml += '<select id="sub-select" onchange="changeSub(this.value)"><option value="">None</option>';
      for (var j = 0; j < allTracks.length; j++) {
        controlsHtml += '<option value="' + j + '">' + (allTracks[j].label || "Track " + (j+1)) + "</option>";
      }
      controlsHtml += '</select></div>';
    }
    controlsHtml += '<div class="c" style="width:auto;white-space:nowrap"><button onclick="prevEpisode()" style="padding:4px 12px;background:#0a0a0a;color:#eee;border:1px solid #333;border-radius:4px;cursor:pointer;font-size:13px"' + (CURRENT_EP_NUM <= 1 ? ' disabled' : '') + '>&#9664; Prev</button></div>';
    controlsHtml += '<div class="c" style="width:auto;white-space:nowrap"><button onclick="nextEpisode()" style="padding:4px 12px;background:#0a0a0a;color:#eee;border:1px solid #333;border-radius:4px;cursor:pointer;font-size:13px">Next &#9654;</button></div>';
    controlsHtml += '<div class="c" style="width:auto;white-space:nowrap"><label><input type="checkbox" id="autoskip-cb" onclick="_autoSkip=this.checked"' + (_autoSkip ? ' checked' : '') + ' style="vertical-align:middle"> AutoSkip</label></div>';
    document.getElementById("player-controls").innerHTML = controlsHtml;
    loadStream(allSources[0]);
    updatePendingIndicator();
  }

  function updateServerDropdown() {
    var sel = document.getElementById("server-select");
    if (!sel) return;
    var curVal = sel.value;
    var html = '';
    for (var si = 0; si < allSources.length; si++) {
      var sprov = allSources[si]._provider || "Source";
      var sq = allSources[si].quality || "";
      html += '<option value="' + si + '">' + sprov + (sq ? " (" + sq + ")" : "") + '</option>';
    }
    sel.innerHTML = html;
    if (curVal && parseInt(curVal, 10) < allSources.length) { sel.value = curVal; }
    // Update quality dropdown if new qualities appeared
    var qs = document.getElementById("quality-select");
    if (qs && allSources.length) {
      var oldQ = qs.value;
      qs.innerHTML = buildQualityOptions();
      if (oldQ && parseInt(oldQ, 10) < allSources.length) { qs.value = oldQ; }
    }
    // Restore AutoSkip checkbox state
    var cb = document.getElementById("autoskip-cb");
    if (cb) cb.checked = _autoSkip;
  }

  function updateSubsDropdown() {
    CURRENT_SUBTITLES = allTracks;
    var ss = document.getElementById("sub-select");
    if (!ss) return;
    var cur = ss.value;
    var html = '<option value="">None</option>';
    for (var si = 0; si < allTracks.length; si++) {
      html += '<option value="' + si + '">' + (allTracks[si].label || "Track " + (si + 1)) + "</option>";
    }
    ss.innerHTML = html;
    if (cur && parseInt(cur, 10) < allTracks.length) { ss.value = cur; }
    else { _currentSubIdx = -1; applySubs(); }
  }
}

function switchStream(val) {
  var idx = parseInt(val, 10);
  if (idx >= 0 && idx < CURRENT_STREAMS.length) {
    loadStream(CURRENT_STREAMS[idx]);
  }
}

function loadExternalIds(mediaId, anilistScore, malId) {
  CURRENT_TMDB_ID = "";
  CURRENT_IMDB_ID = "";
  anilistGraphQL("query ($id: Int) { Media(id: $id) { averageScore idMal externalLinks { site url id } } }", { id: mediaId }, function(err, data) {
    if (!err && data && data.Media) {
      var m = data.Media;
      if (m.averageScore && !anilistScore) anilistScore = m.averageScore;
      if (m.idMal && !malId) malId = m.idMal;
      if (m.externalLinks) {
        for (var i = 0; i < m.externalLinks.length; i++) {
          var site = m.externalLinks[i].site || "";
          if (site === "Crunchyroll") continue;
          var url = m.externalLinks[i].url || "";
          var mt = url.match(/themoviedb\.org\/(?:tv|movie)\/(\d+)/i);
          if (mt) { CURRENT_TMDB_ID = mt[1]; }
          var mi = url.match(/imdb\.com\/title\/(tt\d+)/i);
          if (mi) { CURRENT_IMDB_ID = mi[1]; }
        }
      }
    }
    // Show IDs after we have them
    var afterTmdb = function() {
      showDetailIds();
      fetchMalScore(malId);
      fetchTmdbRating(CURRENT_TMDB_ID);
      if (CURRENT_TMDB_ID) loadTmdbSeasons(CURRENT_TMDB_ID);
    };
    if (CURRENT_TMDB_ID || CURRENT_IMDB_ID) {
      afterTmdb();
    } else {
      searchTMDB(CURRENT_ANIME_TITLE, function(tmdbId) {
        if (tmdbId) {
          CURRENT_TMDB_ID = tmdbId;
          var xhr = new XMLHttpRequest();
          xhr.open("GET", "https://api.themoviedb.org/3/tv/" + tmdbId + "/external_ids?api_key=" + TMDB_KEY);
          xhr.onload = function() {
            if (xhr.status === 200) {
              var edata = JSON.parse(xhr.responseText);
              if (edata.imdb_id) CURRENT_IMDB_ID = edata.imdb_id;
            }
            afterTmdb();
          };
          xhr.onerror = function() { afterTmdb(); };
          xhr.send();
        } else {
          afterTmdb();
        }
      });
    }
    // Show AniList score immediately
    var ratEl = document.getElementById("detail-ratings");
    if (ratEl) {
      var parts = [];
      if (anilistScore) parts.push("AniList: " + anilistScore + "%");
      ratEl.innerHTML = parts.join("  |  ");
    }
  });
}

function fetchMalScore(malId) {
  if (!malId) return;
  var xhr = new XMLHttpRequest();
  xhr.open("GET", "https://api.jikan.moe/v4/anime/" + malId + "?fields=score", true);
  xhr.onload = function() {
    if (xhr.status !== 200) return;
    try {
      var d = JSON.parse(xhr.responseText);
      var score = d.data && d.data.score;
      if (!score) return;
      var ratEl = document.getElementById("detail-ratings");
      if (!ratEl) return;
      var txt = ratEl.textContent || ratEl.innerText || "";
      txt = txt.replace(/MAL: [\d.]+/g, "").replace(/  \|  $/, "").replace(/\s*\|\s*/g, " | ");
      if (txt) txt += "  |  ";
      ratEl.innerHTML = txt + '<span style="color:#38bdf8">MAL: ' + score + '</span>';
    } catch (e) {}
  };
  xhr.send();
}

function fetchTmdbRating(tmdbId) {
  if (!tmdbId) return;
  var xhr = new XMLHttpRequest();
  xhr.open("GET", "https://api.themoviedb.org/3/tv/" + tmdbId + "?api_key=" + TMDB_KEY, true);
  xhr.onload = function() {
    if (xhr.status !== 200) return;
    try {
      var d = JSON.parse(xhr.responseText);
      var rating = d.vote_average;
      if (!rating) return;
      var ratEl = document.getElementById("detail-ratings");
      if (!ratEl) return;
      var txt = ratEl.textContent || ratEl.innerText || "";
      txt = txt.replace(/TMDB: [\d.]+/g, "").replace(/  \|  $/, "").replace(/\s*\|\s*/g, " | ");
      if (txt) txt += "  |  ";
      ratEl.innerHTML = txt + '<span style="color:#38bdf8">TMDB: ' + rating + '</span>';
    } catch (e) {}
  };
  xhr.send();
}

function searchTMDB(title, callback) {
  var xhr = new XMLHttpRequest();
  xhr.open("GET", "https://api.themoviedb.org/3/search/tv?api_key=" + TMDB_KEY + "&query=" + encodeURIComponent(title) + "&language=en-US");
  xhr.onload = function() {
    if (xhr.status === 200) {
      var data = JSON.parse(xhr.responseText);
      if (data.results && data.results.length > 0) {
        callback(data.results[0].id);
      } else {
        callback(null);
      }
    } else {
      callback(null);
    }
  };
  xhr.onerror = function() { callback(null); };
  xhr.send();
}

function showDetailIds() {
  var idEl = document.getElementById("detail-ids");
  if (!idEl) return;
  var parts = [];
  if (CURRENT_TMDB_ID) parts.push("TMDB: " + CURRENT_TMDB_ID);
  if (CURRENT_IMDB_ID) parts.push("IMDb: " + CURRENT_IMDB_ID);
  idEl.innerHTML = parts.length ? parts.join(" &bull; ") : "";
}

function applySubs() {
  var v = document.getElementById("player-video");
  var t = v.getElementsByTagName("track");
  while (t.length) v.removeChild(t[0]);
  if (_currentSubIdx < 0) {
    // Auto-select first English sub
    for (var i = 0; i < CURRENT_SUBTITLES.length; i++) {
      var lbl = (CURRENT_SUBTITLES[i].label || "").toLowerCase();
      if (lbl.indexOf("english") > -1 || lbl.indexOf("eng") > -1 || lbl === "en" || lbl.indexOf("subs") > -1) {
        _currentSubIdx = i; break;
      }
    }
    if (_currentSubIdx < 0 && CURRENT_SUBTITLES.length) _currentSubIdx = 0;
  }
  if (_currentSubIdx >= 0 && _currentSubIdx < CURRENT_SUBTITLES.length) {
    var s = CURRENT_SUBTITLES[_currentSubIdx];
    if (s && s.file) {
      var tr = document.createElement("track");
      tr.kind = "subtitles"; tr.label = s.label || "English"; tr.srclang = "en"; tr.src = s.file; tr.default = true;
      v.appendChild(tr);
    }
  }
  var ss = document.getElementById("sub-select");
  if (ss) ss.value = _currentSubIdx >= 0 ? _currentSubIdx : "";
}

function loadStream(stream) {
  var v = document.getElementById("player-video");
  v.pause(); v.src = ""; v.innerHTML = "";
  if (window._hls) { window._hls.destroy(); window._hls = null; }
  if (_failTimeout) { clearTimeout(_failTimeout); _failTimeout = null; }

  var url = stream.url;
  v.crossOrigin = "anonymous";

  _failTimeout = setTimeout(function() { tryNextStream(stream, "timeout"); }, 10000);

  var gotData = false;
  v.addEventListener("loadeddata", function() {
    if (!gotData) { gotData = true; if (_failTimeout) { clearTimeout(_failTimeout); _failTimeout = null; } }
  }, { once: true });
  v.addEventListener("playing", function() {
    if (_failTimeout) { clearTimeout(_failTimeout); _failTimeout = null; }
  }, { once: true });

  if (url.indexOf(".mp4") > -1 || stream.type === "mp4") {
    v.onerror = function() { if (_failTimeout) { clearTimeout(_failTimeout); _failTimeout = null; } v.onerror = null; v.src = ""; tryNextStream(stream, "error"); };
    v.src = url; v.load();
  } else if (v.canPlayType("application/vnd.apple.mpegurl")) {
    v.src = url; v.load();
  } else if (window.Hls && window.Hls.isSupported()) {
    var hls = new window.Hls(); window._hls = hls;
    hls.on(Hls.Events.ERROR, function(ev, data) {
      if (data.fatal) {
        if (_failTimeout) { clearTimeout(_failTimeout); _failTimeout = null; }
        hls.destroy(); window._hls = null;
        tryNextStream(stream, "hls_error");
      }
    });
    hls.loadSource(url); hls.attachMedia(v);
  } else {
    document.getElementById("player-controls").innerHTML = '<span class="error">HLS not supported in this browser</span>';
  }
  
  setTimeout(function() { applySubs(); }, 200);
}

function tryNextStream(current, reason) {
  var idx = -1;
  for (var i = 0; i < CURRENT_STREAMS.length; i++) {
    if (CURRENT_STREAMS[i] === current) { idx = i; break; }
  }
  if (idx >= 0 && idx + 1 < CURRENT_STREAMS.length) {
    var sel = document.getElementById("server-select");
    if (sel && sel.options) {
      sel.selectedIndex = idx + 1;
      sel.style.color = "#f44";
    }
    var next = CURRENT_STREAMS[idx + 1];
    var pname = next._provider || "Source";
    var pq = next.quality || "";
    document.getElementById("player-info").innerHTML += " <span style='color:#f44;font-size:11px'>→ " + pname + (pq ? " " + pq : "") + "</span>";
    loadStream(next);
  } else {
    document.getElementById("player-controls").innerHTML += "<br><span class=\"error\">All servers failed</span>";
  }
}

function changeQuality() {
  var sel = document.getElementById("quality-select");
  if (!sel) return;
  var idx = parseInt(sel.value, 10);
  var s = CURRENT_STREAMS[idx];
  if (s) loadStream(s);
}

function changeSub(val) {
  _currentSubIdx = val === "" ? -1 : parseInt(val, 10);
  applySubs();
}

function closePlayer() {
  document.getElementById("player-video").style.display = "block";
  var v = document.getElementById("player-video");
  v.pause(); v.src = "";
  if (window._hls) { window._hls.destroy(); window._hls = null; }
  if (_skipInterval) { clearInterval(_skipInterval); _skipInterval = null; }
  if (_failTimeout) { clearTimeout(_failTimeout); _failTimeout = null; }
  _skipTimes = null;
  showPage("detail");
}

var _homeResults = [];

checkAnilistToken();
loadHome();
